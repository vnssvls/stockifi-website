<style>
  :root{

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5}
  .app{display:flex;height:100vh;overflow:hidden}
  .side{width:268px;flex:none;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto}
  .brand{padding:18px 20px;border-bottom:1px solid var(--line)}
  .brand h1{margin:0;font-size:15px;font-weight:700}

  .search{margin:12px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;font:inherit;width:calc(100% - 24px)}

  .nav-btn{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;border:0;background:none;text-align:left;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--ink)}
  .nav-btn:hover{background:var(--bg)}
  .nav-btn.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .nav-btn span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{font-size:11px;font-weight:700;color:#fff;background:var(--edit);border-radius:999px;padding:1px 7px;min-width:18px;text-align:center;flex:none}
  .badge.zero{display:none}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;background:var(--panel);border-bottom:1px solid var(--line)}
  .topbar .grp{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .topbar .ttl{font-size:16px;font-weight:700}
  .topbar .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .actions{display:flex;align-items:center;gap:10px}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
  .btn:hover{background:var(--bg)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{filter:brightness(1.08)}
  .hint{padding:10px 24px;background:#fffaf0;border-bottom:1px solid var(--line);font-size:12.5px;color:#7a5b16}
  .scroll{flex:1;overflow-y:auto;padding:8px 24px 90px}
  .section-h{margin:22px 0 4px;font-size:13px;font-weight:700;color:var(--accent);border-bottom:2px solid var(--accent-soft);padding-bottom:6px}
  .rowhead{display:grid;grid-template-columns:150px 1fr 1fr 1fr;gap:14px;position:sticky;top:0;background:var(--bg);padding:8px 0 8px;z-index:5;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .row{display:grid;grid-template-columns:150px 1fr 1fr 1fr;gap:14px;align-items:start;padding:11px 0;border-top:1px solid var(--line)}
  .row .lbl{font-size:12px;color:var(--muted);padding-top:8px;word-break:break-word}
  .en{background:var(--en);border:1px solid var(--line);border-radius:8px;padding:9px 11px;white-space:pre-wrap}
  textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font:inherit;color:var(--ink);background:#fff;resize:none;overflow:hidden;min-height:40px}
  textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .fieldwrap{position:relative}
  .fieldwrap.edited textarea{border-color:var(--edit);background:var(--edit-bg)}
  .tag{position:absolute;top:-8px;right:8px;font-size:10px;font-weight:700;color:#fff;background:var(--edit);border-radius:999px;padding:1px 7px;display:none}
  .fieldwrap.edited .tag{display:block}
  .empty{padding:40px;text-align:center;color:var(--muted)}
</style>
</head>

dd locations. See it on the floor.", "no": "Oppdage svinn, overporsjoning og prisdrift tidlig, slik at den daglige driften holdes under kontroll selv når du legger til lokasjoner. Se det i praksis.", "sv": "Fånga upp svinn, överportering och prisdrift tidigt, så att den dagliga driften hålls under kontroll även när du lägger till fler locations. Se det i praktiken.", "id": "33"}, {"label": "", "en": "Stockifi for Operations", "no": "Stockifi for drift", "sv": "Stockifi för drift", "id": "34"}, {"label": "", "en": "Recipes that cost themselves", "no": "Oppskrifter som kostnadssetter seg selv", "sv": "Recept som kostnadsberäknar sig själva", "id": "35"}, {"label": "", "en": "Chefs see the live cost and margin of every dish, so menu calls reflect what ingredients cost today. See it in the kitchen.", "no": "Kokker ser den live-kostnaden og marginen på hver rett, slik at menybeslutninger gjenspeiler hva ingrediensene koster i dag. Se det på kjøkkenet.", "sv": "Kockar ser den aktuella kostnaden och marginalen för varje rätt, så att menybesluten speglar vad ingredienserna kostar idag. Se det i köket.", "id": "36"}, {"label": "", "en": "Stockifi for Kitchen", "no": "Stockifi for kjøkken", "sv": "Stockifi för kök", "id": "37"}, {"label": "", "en": "COGS you can actually trust", "no": "Vareforbruk du faktisk kan stole på", "sv": "Varukostnad du faktiskt kan lita på", "id": "38"}, {"label": "", "en": "Finance gets actual against theoretical cost from real invoice and POS data, so month-end stops being a guessing game. See it on the books.", "no": "Økonomiavdelingen får faktisk mot teoretisk kostnad fra ekte faktura- og POS-data, slik at månedsslutt slutter å være et gjettespill. Se det i regnskapene.", "sv": "Ekonomiavdelningen får faktisk mot teoretisk kostnad från riktiga faktura- och kassauppgifter, så att månadsavslutet slutar vara ett gissningsspel. Se det i böckerna.", "id": "39"}, {"label": "", "en": "Stockifi for Finance", "no": "Stockifi for økonomi", "sv": "Stockifi  "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "metaTitle"}, "id": "0"}, {"label": "Meta description", "en": "Stockifi checks every supplier invoice and flags overcharges, and unusual price spikes before they get into your food cost. Book a demo to learn more.", "no": "Stockifi kontrollerer hver leverandørfaktura og varsler om overbelastninger og uvanlige prisstigninger før de påvirker matkostnaden din. Book en demo for å lære mer.", "sv": "Stockifi kontrollerar varje leverantörsfaktura och flaggar överdebiteringar, dubbelfaktureringar och ovanliga prisjumpar, så att faktureringsfel aldrig smiter igenom.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "metaDescription"}, "id": "1"}]}, {"name": "Hero", "rows": [{"label": "Eyebrow", "en": "Anomaly detection", "no": "Avviksdeteksjon", "sv": "Avvikelsedetektering", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "eyebrow"}, "id": "2"}, {"label": "Heading", "en": "Stop overpaying your suppliers", "no": "Slutt å overbetale leverandørene dine", "sv": "Sluta överbetala dina leverantörer", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "heading"}, "id": "3"}, {"label": "Subhead", "en": "An overcharge looks just like every other line on the invoice. Stockifi checks each one for you and flags what's worth a second look, so billing errors get caught while you can still claw them back.", "no": "En feilbelastning ser ut akkurat som alle andre linjer på fakturaen. Stockifi sjekker hver enkelt for deg og markerer det som er verdt en ekstra titt, slik at fakturafeil blir oppdaget mens du fortsatt kan kreve dem tilbake.", "sv": "En överdebitering ser precis likadan ut som varje annan rad på fakturan. Stockifi kontrollerar varje rad åt dig och flaggar vad som är värt en andra titt, så att faktureringsfel fångas medan du fortfarande kan få tillbaka pengarna.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "subhead"}, "id": "4"}]}, {"name": "How it works", "rows": [{"label": "Tagline", "en": "How it works", "no": "Slik fungerer det", "sv": "Så här fungerar det", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "howItWorks.tagline"}, "id": "5"}, {"label": "Heading", "en": "The odd charge stands out", "no": "Den merkelige belastningen skiller seg ut", "sv": "Det avvikande beloppet sticker ut", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "howItWorks.heading"}, "id": "6"}, {"label": "Body", "en": "A month of invoices runs to hundreds of lines, and an overcharge or a double-bill looks just like every other entry. Stockifi checks each line against what that ingredient normally costs and flags the ones that do not fit, so a billing error gets caught while you can still query it.", "no": "En måneds fakturaer kan inneholde hundrevis av linjer, og en feilbelastning eller dobbeltfaktura ser ut akkurat som alle andre oppføringer. Stockifi sjekker hver linje mot hva den ingrediensen normalt koster og markerer de som ikke stemmer, slik at en fakturafeil blir oppdaget mens du fortsatt kan reklamere på den.", "sv": "En månads fakturor kan innehålla hundratals rader, och en överdebitering eller en dubbelfakturering ser precis likadan ut som alla andra poster. Stockifi kontrollerar varje rad mot vad den ingrediensen normalt kostar och flaggar de som inte stämmer, så att ett faktureringsfel fångas medan du fortfarande kan ifrågasätta det.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "howItWorks.body"}, "id": "7"}, {"label": "Point 1 — heading", "en": "Every line checked", "no": "Hver linje kontrollert", "sv": "Varje rad kontrolleras", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "howItWorks.points[0].heading"}, "id": "8"}, {"label": "Point 1 — body", "en": "Stockifi compares each charge against the ingredient's normal price.", "no": "Stockifi sammenligner hver belastning med ingrediensens normale pris.", "sv": "Stockifi jämför varje debitering mot ingrediensens normala pris.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "howItWorks.points[0].body"}, "id": "9"}, {"label": "Point 2 — heading", "en": "Outliers flagged", "no": "Avvik markert", "sv": "Avvikelser flaggas", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "howItWorks.points[1].heading"}, "id": "10"}, {"label": "Point 2 — body", "en": "Overcharges, double-bills, and odd jumps are surfaced for review.", "no": "Feilbelastninger, dobbeltfakturaer og merkelige hopp blir synliggjort for gjennomgang.", "sv": "Överdebiteringar, dubbelfaktureringar och ovanliga prisjumpar lyfts fram för granskning.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "howItWorks.points[1].body"}, "id": "11"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "Real from wrong", "no": "Ekte eller feil", "sv": "Verklig vs. felaktig", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "benefits[0].heading"}, "id": "12"}, {"label": "Benefit 1 — body", "en": "A real rise passes; an odd charge gets flagged.", "no": "En reell prisøkning godkjennes, en merkelig belastning markeres.", "sv": "En verklig prisstegring godkänns; ett avvikande belopp flaggas.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "benefits[0].body"}, "id": "13"}, {"label": "Benefit 2 — heading", "en": "Double-bills too", "no": "Dobbeltfakturaer også", "sv": "Dubbelfaktureringar också", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "benefits[1].heading"}, "id": "14"}, {"label": "Benefit 2 — body", "en": "Duplicate lines and double-bills get caught as well.", "no": "Duplikate linjer og dobbeltfakturaer blir fanget opp på samme måte.", "sv": "Dubbla rader och dubbelfaktureringar fångas också upp.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "benefits[1].body"}, "id": "15"}, {"label": "Benefit 3 — heading", "en": "Query with proof", "no": "Reklamér med dokumentasjon", "sv": "Ifrågasätt med bevis", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "benefits[2].heading"}, "id": "16"}, {"label": "Benefit 3 — body", "en": "Each flag shows the charge and why it stood out.", "no": "Hvert avvik viser belastningen og hvorfor den skilte seg ut.", "sv": "Varje flaggning visar beloppet och varför det stack ut.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "benefits[2].body"}, "id": "17"}, {"label": "Benefit 4 — heading", "en": "Money back", "no": "Pengene tilbake", "sv": "Pengar tillbaka", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "benefits[3].heading"}, "id": "18"}, {"label": "Benefit 4 — body", "en": "Catch an error early and you can still claim it back.", "no": "Oppdager du en feil tidlig, kan du fortsatt kreve dem tilbake.", "sv": "Fånga ett fel tidigt och du kan fortfarande kräva tillbaka det.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "benefits[3].body"}, "id": "19"}]}, {"name": "FAQ", "rows": [{"label": "FAQ 1 — question", "en": "Will Stockifi flag a normal price rise as an error?", "no": "Vil Stockifi markere en normal prisøkning som en feil?", "sv": "Kommer Stockifi att flagga en normal prishöjning som ett fel?", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "faqs[0].question"}, "id": "20"}, {"label": "FAQ 1 — answer", "en": "No. A rise that fits an ingredient's usual trend is treated as a price change. Stockifi flags the charges that jump above what its own history would expect.", "no": "Nei. En økning som passer inn i ingrediensens vanlige trend, behandles som en prisendring. Stockifi markerer belastningene som hopper over det prishistorikken tilsier.", "sv": "Nej. En stegring som passar ingrediensens vanliga trend behandlas som en prisförändring. Stockifi flaggar de debiteringar som hoppar över vad dess egen historik skulle förvänta sig.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "faqs[0].answer"}, "id": "21"}, {"label": "FAQ 2 — question", "en": "What happens after an anomaly is flagged?", "no": "Hva skjer etter at et avvik er markert?", "sv": "Vad händer efter att en avvikelse har flaggats?", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "faqs[1].question"}, "id": "22"}, {"label": "FAQ 2 — answer", "en": "The invoice is surfaced for you to review, with the charge and what it was checked against, so you can query the supplier while it is still recent.", "no": "Fakturaen synliggjøres for gjennomgang, med belastningen og hva den ble kontrollert mot, slik at du kan kontakte leverandøren mens det fortsatt er aktuelt.", "sv": "Fakturan lyfts fram för dig att granska, med beloppet och vad det kontrollerades mot, så att du kan ifrågasätta leverantören medan det fortfarande är aktuellt.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "faqs[1].answer"}, "id": "23"}, {"label": "FAQ 3 — question", "en": "How is this different from supplier price tracking?", "no": "Hva er forskjellen fra leverandørprissporning?", "sv": "Hur skiljer sig detta från leverantörsprisspårning?", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "faqs[2].question"}, "id": "24"}, {"label": "FAQ 3 — answer", "en": "Price tracking follows how prices move over time. Anomaly detection flags the individual invoices that look wrong, so you can query them.", "no": "Prissporning følger hvordan priser beveger seg over tid. Avviksdeteksjon markerer de enkeltfakturaene som ser feil ut, slik at du kan reklamere på dem.", "sv": "Prisspårning följer hur priser rör sig över tid. Avvikelsedetektering flaggar de enskilda fakturorna som ser felaktiga ut, så att du kan ifrågasätta dem.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "faqs[2].answer"}, "id": "25"}, {"label": "FAQ 4 — question", "en": "Does Stockifi need price history before it can catch errors?", "no": "Trenger Stockifi prishistorikk for å fange opp feil?", "sv": "Behöver Stockifi prishistorik innan det kan fånga fel?", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "faqs[3].question"}, "id": "26"}, {"label": "FAQ 4 — answer", "en": "It starts checking against each ingredient's prices as invoices come in, and its flags get sharper as that history builds.", "no": "Det begynner å sjekke mot hver ingrediens sine priser etter hvert som fakturaer kommer inn, og avvikene blir skarpere desto mer historikk som bygges opp.", "sv": "Det börjar kontrollera mot varje ingrediens priser när fakturorna kommer in, och flaggningarna blir skarpare allteftersom historiken byggs upp.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "faqs[3].answer"}, "id": "27"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "Stop paying for invoice errors", "no": "Slutt å betale for fakturafeil", "sv": "Sluta betala för faktureringsfel", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "ctaHeading"}, "id": "28"}, {"label": "Subhead", "en": "Book a short call and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Book en kort samtale, så viser vi deg hva Stockifi avdekker i løpet av de første 30 dagene.", "sv": "Boka ett kort samtal så visar vi dig vad Stockifi hittar under dina första 30 dagar.", "src": {"no": "content/products/no/anomaly-detection.md", "sv": "content/products/sv/anomaly-detection.md", "field": "ctaSubhead"}, "id": "29"}]}]}, {"key": "products-api", "label": "API", "group": "Products", "sections": [{"name": "Meta", "rows": [{"label": "Meta title", "en": "Stockifi API | Pull Food Cost Data into Your BI Stack", "no": "Stockifi API | Hent matkostnaddata til BI-verktøyet ditt", "sv": "Stockifi API för restaurangdata | Stockifi", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "metaTitle"}, "id": "0"}, {"label": "Meta description", "en": "Connect Stockifi to your own BI tools or data warehouse. Pull food cost, variance, recipes, and sales data through a clean API, real-time or scheduled.", "no": "Koble Stockifi til dine egne BI-verktøy eller datalager. Hent matkostnad, avvik, oppskrifter og salgsdata via et rent API, i sanntid eller planlagt.", "sv": "Hämta din Stockifi-data, varukostnad, avvikelse, recept och försäljning, till dina egna BI-verktyg och ditt datalager via ett rent API, i realtid eller schemalagt.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "metaDescription"}, "id": "1"}]}, {"name": "Hero", "rows": [{"label": "Heading", "en": "Pull your Stockifi data into your own tools", "no": "Hent Stockifi-dataene dine inn i dine egne verktøy", "sv": "Hämta din Stockifi-data till dina egna verktyg", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "heading"}, "id": "2"}, {"label": "Subhead", "en": "Your team can work with Stockifi's numbers inside the BI tools it already runs. A clean API gives them direct access to your performance data.", "no": "Teamet ditt kan jobbe med Stockifis tall inne i BI-verktøyene det allerede bruker. Et ryddig API gir direkte tilgang til ytelsesdataene dine.", "sv": "Ditt team kan arbeta med Stockifis siffror i de BI-verktyg det redan använder. Ett rent API ger dem direkt åtkomst till din prestandadata.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "subhead"}, "id": "3"}]}, {"name": "How it works", "rows": [{"label": "Tagline", "en": "How it works", "no": "Slik fungerer det", "sv": "Så här fungerar det", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "howItWorks.tagline"}, "id": "4"}, {"label": "Heading", "en": "What you can pull, and how", "no": "Hva du kan hente ut, og hvordan", "sv": "Vad du kan hämta, och hur", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "howItWorks.heading"}, "id": "5"}, {"label": "Body", "en": "Everything Stockifi works out lives behind the API: your food cost, variance, recipes, invoices, and sales, cleanly structured. Your developers connect to it directly and pull what they need into your BI tool or your own dashboards, in real time or on a set schedule.", "no": "Alt Stockifi beregner er tilgjengelig via API-et: varekostnad, avvik, oppskrifter, fakturaer og salg, strukturert og klart. Utviklerne dine kobler seg direkte til det og henter det de trenger inn i BI-verktøyet ditt eller dine egne dashbord, i sanntid eller etter en fast plan.", "sv": "Allt Stockifi räknar ut finns bakom API:et: din varukostnad, avvikelse, recept, fakturor och försäljning, strukturerat och klart. Dina utvecklare ansluter direkt och hämtar det de behöver till ditt BI-verktyg eller dina egna dashboards, i realtid eller enligt ett schema.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "howItWorks.body"}, "id": "6"}, {"label": "Point 1 — heading", "en": "Structured endpoints", "no": "Strukturerte endepunkter", "sv": "Strukturerade endpoints", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "howItWorks.points[0].heading"}, "id": "7"}, {"label": "Point 1 — body", "en": "Each dataset has its own clean endpoint to call.", "no": "Hvert datasett har sitt eget ryddige endepunkt å kalle.", "sv": "Varje dataset har sin egen rena endpoint att anropa.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "howItWorks.points[0].body"}, "id": "8"}, {"label": "Point 2 — heading", "en": "Real time or scheduled", "no": "Sanntid eller planlagt", "sv": "Realtid eller schemalagt", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "howItWorks.points[1].heading"}, "id": "9"}, {"label": "Point 2 — body", "en": "Pull live, or sync on the schedule your reporting needs.", "no": "Hent live, eller synkroniser etter den planen rapporteringen krever.", "sv": "Hämta live, eller synkronisera enligt det schema din rapportering kräver.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "howItWorks.points[1].body"}, "id": "10"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "In your tools", "no": "I dine egne verktøy", "sv": "I dina verktyg", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "benefits[0].heading"}, "id": "11"}, {"label": "Benefit 1 — body", "en": "Stockifi's numbers sit inside the BI tools your team runs.", "no": "Stockifis tall ligger inne i BI-verktøyene teamet ditt bruker.", "sv": "Stockifis siffror lever i de BI-verktyg ditt team använder.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "benefits[0].body"}, "id": "12"}, {"label": "Benefit 2 — heading", "en": "Numbers that agree", "no": "Tall som stemmer overens", "sv": "Siffror som stämmer", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "benefits[1].heading"}, "id": "13"}, {"label": "Benefit 2 — body", "en": "The same food-cost data feeds Stockifi and your wider stack.", "no": "De samme varekostnadsdataene mater både Stockifi og resten av stakken din.", "sv": "Samma varukostnadsdata matar Stockifi och ditt övriga system.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "benefits[1].body"}, "id": "14"}, {"label": "Benefit 3 — heading", "en": "No manual exports", "no": "Ingen manuelle eksporter", "sv": "Inga manuella exporter", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "benefits[2].heading"}, "id": "15"}, {"label": "Benefit 3 — body", "en": "Pull through the API instead of copying spreadsheets between systems.", "no": "Hent via API-et i stedet for å kopiere regneark mellom systemer.", "sv": "Hämta via API:et i stället för att kopiera kalkylblad mellan system.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "benefits[2].body"}, "id": "16"}, {"label": "Benefit 4 — heading", "en": "For data teams", "no": "For datateam", "sv": "För datateam", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "benefits[3].heading"}, "id": "17"}, {"label": "Benefit 4 — body", "en": "Made for the developers and analysts who run your stack.", "no": "Laget for utviklerne og analytikerne som drifter stakken din.", "sv": "Byggt för de utvecklare och analytiker som driver ditt system.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "benefits[3].body"}, "id": "18"}]}, {"name": "FAQ", "rows": [{"label": "FAQ 1 — question", "en": "Do I need a developer to use the API?", "no": "Trenger jeg en utvikler for å bruke API-et?", "sv": "Behöver jag en utvecklare för att använda API:et?", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "faqs[0].question"}, "id": "19"}, {"label": "FAQ 1 — answer", "en": "Yes. It is built for a team that works with structured data, your own developers or BI analysts. If you would rather not build anything, Stockifi's own dashboards cover the reporting most operators need.", "no": "Ja. Det er bygget for team som jobber med strukturerte data, dine egne utviklere eller BI-analytikere. Foretrekker du å ikke bygge noe selv, dekker Stockifis egne dashbord rapporteringsbehovet de fleste operatører har.", "sv": "Ja. Det är byggt för ett team som arbetar med strukturerad data, dina egna utvecklare eller BI-analytiker. Om du hellre inte bygger något täcker Stockifis egna dashboards den rapportering de flesta operatörer behöver.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "faqs[0].answer"}, "id": "20"}, {"label": "FAQ 2 — question", "en": "Can I push data into Stockifi through the API, or only pull it out?", "no": "Kan jeg sende data inn i Stockifi via API-et, eller bare hente det ut?", "sv": "Kan jag skicka data till Stockifi via API:et, eller bara hämta ut det?", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "faqs[1].question"}, "id": "21"}, {"label": "FAQ 2 — answer", "en": "The API is for pulling your Stockifi data out into your own tools. Bringing data in, like sales and invoices, is handled by Stockifi's POS and accounting integrations.", "no": "API-et er for å hente Stockifi-dataene dine ut i dine egne verktøy. Data som skal inn, som salg og fakturaer, håndteres av Stockifis kassesystem- og regnskapsintegrasjoner.", "sv": "API:et är till för att hämta ut din Stockifi-data till dina egna verktyg. Att föra in data, som försäljning och fakturor, hanteras av Stockifis kassasystem- och bokföringsintegrationer.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "faqs[1].answer"}, "id": "22"}, {"label": "FAQ 3 — question", "en": "How current is the data the API returns?", "no": "Hvor oppdaterte er dataene API-et returnerer?", "sv": "Hur aktuell är datan som API:et returnerar?", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "faqs[2].question"}, "id": "23"}, {"label": "FAQ 3 — answer", "en": "As current as Stockifi itself. The numbers reflect your latest invoices, sales, and counts, whether you pull in real time or on a schedule.", "no": "Like oppdaterte som Stockifi selv. Tallene gjenspeiler de nyeste fakturaene, salget og varetellinger dine, enten du henter i sanntid eller etter en plan.", "sv": "Lika aktuell som Stockifi självt. Siffrorna speglar dina senaste fakturor, försäljning och inventeringar, oavsett om du hämtar i realtid eller enligt ett schema.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "faqs[2].answer"}, "id": "24"}, {"label": "FAQ 4 — question", "en": "Which plan includes the API?", "no": "Hvilken plan inkluderer API-et?", "sv": "Vilket abonnemang inkluderar API:et?", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "faqs[3].question"}, "id": "25"}, {"label": "FAQ 4 — answer", "en": "API access sits with our higher-tier and Custom plans. We'll confirm the fit for your setup on a call.", "no": "API-tilgang følger med våre høyere nivåer og Custom-planen. Vi bekrefter hva som passer for oppsettet ditt på en samtale.", "sv": "API-åtkomst ingår i våra högre abonnemang och Custom-planen. Vi bekräftar vad som passar din uppsättning på ett samtal.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "faqs[3].answer"}, "id": "26"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "Put your Stockifi data to work", "no": "Sett Stockifi-dataene dine i arbeid", "sv": "Sätt din Stockifi-data i arbete", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "ctaHeading"}, "id": "27"}, {"label": "Subhead", "en": "Book a short call and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Book en kort samtale, så viser vi deg hva Stockifi avdekker i løpet av de første 30 dagene.", "sv": "Boka ett kort samtal så visar vi vad Stockifi synliggör under dina första 30 dagar.", "src": {"no": "content/products/no/api.md", "sv": "content/products/sv/api.md", "field": "ctaSubhead"}, "id": "28"}]}]}, {"key": "products-central-kitchen", "label": "Central kitchen", "group": "Products", "sections": [{"name": "Meta", "rows": [{"label": "Meta title", "en": "Central Kitchen Software for Restaurants | Stockifi", "no": "Programvare for sentralkjøkken | Stockifi", "sv": "Centralköksprogram för restauranger | Stockifi", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "metaTitle"}, "id": "0"}, {"label": "Meta description", "en": "Run a central kitchen that supplies your outlets with real production costs, internal orders, and inventory tracked across every location inside Stockifi.", "no": "Driv et sentralkjøkken som forsyner utsalgsstedene dine med reelle produksjonskostnader, interne bestillinger og lager sporet på tvers av alle steder i Stockifi.", "sv": "Driv ett centralt produktionskök som försörjer dina enheter, med verkliga produktionskostnader och interna beställningar spårade på varje plats.", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "metaDescription"}, "id": "1"}]}, {"name": "Hero", "rows": [{"label": "Eyebrow", "en": "Central kitchen", "no": "Sentralkjøkken", "sv": "Centralkök", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "eyebrow"}, "id": "2"}, {"label": "Heading", "en": "Supply every outlet from one kitchen", "no": "Forsyn hvert utsalgssted fra ett kjøkken", "sv": "Försörj varje enhet från ett kök", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "heading"}, "id": "3"}, {"label": "Subhead", "en": "Each outlet orders what it needs and pays the real production cost. Stockifi keeps that cost accurate, so margins stay true across the whole group.", "no": "Hvert utsalgssted bestiller det de trenger og betaler den reelle produksjonskostnaden. Stockifi holder den kostnaden nøyaktig, slik at marginen forblir korrekt for hele gruppen.", "sv": "Varje enhet beställer det den behöver och betalar den verkliga produktionskostnaden. Stockifi håller den kostnaden korrekt, så marginalerna stämmer i hela gruppen.", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "subhead"}, "id": "4"}]}, {"name": "How it works", "rows": [{"label": "Tagline", "en": "How it works", "no": "Slik fungerer det", "sv": "Så fungerar det", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "howItWorks.tagline"}, "id": "5"}, {"label": "Heading", "en": "Stockifi treats your kitchen as an internal supplier", "no": "Stockifi behandler kjøkkenet ditt som en intern leverandør", "sv": "Stockifi behandlar ditt kök som en intern leverantör", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "howItWorks.heading"}, "id": "6"}, {"label": "Body", "en": "When you produce in one kitchen and ship to several outlets, the real cost of what you make is easy to lose. Stockifi treats the central kitchen as a supplier to your outlets: it adds up the ingredients and prep behind each item, then carries that cost into the price every outlet pays.", "no": "Når du produserer på ett kjøkken og leverer til flere utsalgssteder, er det lett å miste oversikten over den reelle kostnaden for det du lager. Stockifi behandler sentralkjøkkenet som en leverandør til utsalgsstedene dine: det summerer ingredienser og tilberedning bak hvert produkt, og fører den kostnaden videre til prisen hvert utsalgssted betaler.", "sv": "När du producerar i ett kök och levererar till flera enheter är det lätt att tappa den verkliga kostnaden för vad du tillverkar. Stockifi behandlar centralköket som en leverantör till dina enheter: det summerar ingredienser och förberedelse bakom varje artikel och för sedan den kostnaden vidare till priset varje enhet betalar.", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "howItWorks.body"}, "id": "7"}, {"label": "Point 1 — heading", "en": "Costed from the ground up", "no": "Kostnadsberegnet fra grunnen av", "sv": "Kostnadsberäknat från grunden", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "howItWorks.points[0].heading"}, "id": "8"}, {"label": "Point 1 — body", "en": "Ingredients and prep add up to the real cost of each central-kitchen item.", "no": "Ingredienser og tilberedning summeres til den reelle kostnaden for hvert sentralkjøkkenproduk.", "sv": "Ingredienser och förberedelse summeras till den verkliga kostnaden för varje artikel från centralköket.", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "howItWorks.points[0].body"}, "id": "9"}, {"label": "Point 2 — heading", "en": "Carried to each outlet", "no": "Videreført til hvert utsalgssted", "sv": "Förs vidare till varje enhet", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "howItWorks.points[1].heading"}, "id": "10"}, {"label": "Point 2 — body", "en": "Outlets pay that cost, so their recipes and margins stay true.", "no": "Utsalgsstedene betaler den kostnaden, slik at oppskriftene og marginen holder seg korrekt.", "sv": "Enheterna betalar den kostnaden, så deras recept och marginaler stämmer.", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "howItWorks.points[1].body"}, "id": "11"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "Consistent cost", "no": "Konsistent kostnad", "sv": "Konsekvent kostnad", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "benefits[0].heading"}, "id": "12"}, {"label": "Benefit 1 — body", "en": "Every outlet that orders an item carries the same cost.", "no": "Hvert utsalgssted som bestiller et produkt, bærer den samme kostnaden.", "sv": "Varje enhet som beställer en artikel bär samma kostnad.", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "benefits[0].body"}, "id": "13"}, {"label": "Benefit 2 — heading", "en": "All orders visible", "no": "Alle bestillinger synlige", "sv": "Alla beställningar synliga", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "benefits[1].heading"}, "id": "14"}, {"label": "Benefit 2 — body", "en": "See what each outlet pulls and what it costs.", "no": "Se hva hvert utsalgssted henter og hva det koster.", "sv": "Se vad varje enhet tar ut och vad det kostar.", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "benefits[1].body"}, "id": "15"}, {"label": "Benefit 3 — heading", "en": "Built for groups", "no": "Bygget for kjeder", "sv": "Byggt för grupper", "src": {"no": "content/products/no/central-k andlar det som en intern leverantör, så enheterna beställer från det och dess verkliga kostnader flödar in i deras varukostnad.", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "faqs[0].answer"}, "id": "21"}, {"label": "FAQ 2 — question", "en": "How does Stockifi cost what the central kitchen makes?", "no": "Hvordan beregner Stockifi kostnadene for det sentralkjøkkenet produserer?", "sv": "Hur beräknar Stockifi kostnaden för vad centralköket tillverkar?", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "faqs[1].question"}, "id": "22"}, {"label": "FAQ 2 — answer", "en": "The central kitchen buys its ingredients from outside suppliers, Stockifi reads those invoices, and the cost of ingredients plus prep becomes the price each outlet pays.", "no": "Sentralkjøkkenet kjøper ingredienser fra eksterne leverandører, Stockifi leser de fakturaene, og kostnaden for ingredienser pluss tilberedning blir prisen hvert utsalgssted betaler.", "sv": "Centralköket köper sina ingredienser från externa leverantörer, Stockifi läser in fakturorna, och kostnaden för ingredienser plus förberedelse blir priset varje enhet betalar.", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "faqs[1].answer"}, "id": "23"}, {"label": "FAQ 3 — question", "en": "Does this handle ordering from external suppliers?", "no": "Dekker dette bestillinger fra eksterne leverandører?", "sv": "Hanterar det här beställningar från externa leverantörer?", "src": {"no": "content/products/no/central-kitchen.md", "sv": "content/products/sv/central-kitchen.md", "field": "faqs[2].question"}, "id": "24"}, {"label": "FAQ 3 — answer", "en": "No. Stockifi covers internal supply from your own central kitchen to your outlets. It does not place orders with outside suppliers.", "no": "Nei. Stockifi dekker intern forsyning fra ditt eget sentr de at?", "no": "Hvilken verdi brukes ved en overføring?", "sv": "Till vilket värde görs en transferering?", "src": {"no": "content/products/no/inventory-transfers.md", "sv": "content/products/sv/inventory-transfers.md", "field": "faqs[1].question"}, "id": "22"}, {"label": "FAQ 2 — answer", "en": "At the real cost of the stock that moved, so the sending site's cost goes down and the receiving site's goes up by the same amount.", "no": "Den faktiske kostprisen på varene som flyttes, slik at det sendende stedets kostnad går ned og det mottakende stedets går opp med samme beløp.", "sv": "Till den verkliga kostnaden för de varor som flyttades, så att den avsändande enhetens kostnad minskar och den mottagande enhetens ökar med samma belopp.", "src": {"no": "content/products/no/inventory-transfers.md", "sv": "content/products/sv/inventory-transfers.md", "field": "faqs[1].answer"}, "id": "23"}, {"label": "FAQ 3 — question", "en": "What happens if a transfer is missed?", "no": "Hva skjer hvis en overføring ikke registreres?", "sv": "Vad händer om en transferering missas?", "src": {"no": "content/products/no/inventory-transfers.md", "sv": "content/products/sv/inventory-transfers.md", "field": "faqs[2].question"}, "id": "24"}, {"label": "FAQ 3 — answer", "en": "The stock shows as used at the site it left and as surplus at the one it reached, so both sites' variance is off until you make the move in Stockifi.", "no": "Varene vises som brukt på stedet de forlot og som overskudd på stedet de ankom, slik at begge steders avvik er feil inntil du registrerer flytten i Stockifi.", "sv": "Varorna visas som förbrukade på den enhet de lämnade och som överskott på den de nådde, så båda enheternas avvikelse är felaktig tills du registrerar flytten i Stockifi.", "src": {"no": "content/products/no/inventory-transfers.md", "sv": "content/products/sv/inventory-transfers.md", "field": "faqs[2].answer"}, "id": "25"}, {"label": "FAQ 4 — question", "en": "Do transfers need a POS or accounting connection?", "no": "Krever overføringer tilkobling til kassesystem eller regnskap?", "sv": "Kräver transfereringar en kassa- eller bokföringsanslutning?", "src": {"no": "content/products/no/inventory-transfers.md", "sv": "content/products/sv/inventory-transfers.md", "field": "faqs[3].question"}, "id": "26"}, {"label": "FAQ 4 — answer", "en": "No. Transfers happen in the app against your count, so they work wherever you run stock counts, with no extra integration.", "no": "Nei. Overføringer skjer i appen mot varetelling, så de fungerer uansett hvor du gjennomfører varetellinger, uten noen ekstra integrasjon.", "sv": "Nej. Transfereringar görs i appen mot din inventering, så de fungerar oavsett var du utför inventeringar, utan någon extra integration.", "src": {"no": "content/products/no/inventory-transfers.md", "sv": "content/products/sv/inventory-transfers.md", "field": "faqs[3].answer"}, "id": "27"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "Keep every location's count accurate", "no": "Hold tellingen nøyaktig på alle lokasjoner", "sv": "Håll varje enhets inventering korrekt", "src": {"no": "content/products/no/inventory-transfers.md", "sv": "content/products/sv/inventory-transfers.md", "field": "ctaHeading"}, "id": "28"}, {"label": "Subhead", "en": "Book a short call and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Book et kort møte, så viser vi deg hva Stockifi avdekker i dine første 30 dager.", "sv": "Boka ett kort samtal så visar vi vad Stockifi synliggör under dina första 30 dagar.", "src": {"no": "content/products/no/inventory-transfers.md", "sv": "content/products/sv/inventory-transfers.md", "field": "ctaSubhead"}, "id": "29"}]}]}, {"key": "products-invoice-automation", "label": "Invoice automation", "group": "Products", "sections": [{"name": "Meta", "rows": [{"label": "Meta title", "en": "Invoice Automation for Restaurants | Stockifi", "no": "Fakturaautomatisering for restauranter | Stockifi", "sv": "Fakturaautomatisering ", "src": {"no": "content/products/no/invoice-automation.md", "sv": "content/products/sv/invoice-automation.md", "field": "subhead"}, "id": "4"}]}, {"name": "How it works", "rows": [{"label": "Tagline", "en": "How it works", "no": "Slik fungerer det", "sv": "Så här fungerar det", "src": {"no": "content/products/no/invoice-automation.md", "sv": "content/products/sv/invoice-automation.md", "field": "howItWorks.tagline"}, "id": "5"}, {"label": "Heading", "en": "It comes straight from your accounting", "no": "Det kommer rett fra regnskapet ditt", "sv": "Det kommer direkt från din redovisning", "src": {"no": "content/products/no/invoice-automation.md", "sv": "content/products/sv/invoice-automation.md", "field": "howItWorks.heading"}, "id": "6"}, {"label": "Body", "en": "Every supplier invoice already lands in your accounting. Stockifi reads each one line by line and feeds the prices and quantities straight into your food cost, with nobody keying them in.", "no": "Alle leverandørfakturaer havner allerede i regnskapet ditt. Stockifi leser hver enkelt linje for linje og sender priser og mengder direkte inn i varekostnaden din, uten at noen taster dem inn manuelt.", "sv": "Varje leverantörsfaktura landar redan i din redovisning. Stockifi läser varje faktura rad för rad och skickar priser och kvantiteter direkt till din varukostnad, utan att någon behöver mata in dem manuellt.", "src": {"no": "content/products/no/invoice-automation.md", "sv": "content/products/sv/invoice-automation.md", "field": "howItWorks.body"}, "id": "7"}, {"label": "Point 1 — heading", "en": "Synced automatically", "no": "Synkroniseres automatisk", "sv": "Synkroniseras automatiskt", "src": {"no": "content/products/no/invoice-automation.md", "sv": "content/products/sv/invoice-automation.md", "field": "howItWorks.points[0].heading"}, "id": "8"}, {"label": "Point 1 — body", "en": "Invoices flow in as they land in your accounting, with nothing to upload or scan.", "no": "Fakturaer flyter inn så snart de lander i regnskapet ditt, uten noe å laste opp eller skanne.", "sv": "Fakturor flödar in när de landar i din redovisning, utan att behöva laddas upp eller skannas.", "src": {"no": "content/products/no/invoice-automation.md", "sv": "content/products/sv/invoice-automation.md", "field": "howItWorks.points[0].body"}, "id": "9"}, {"label": "Point 2 — heading", "en": "Read line by line", "no": "Leses linje for linje", "sv": "Läses rad för rad", "src": {"no": "content/products/no/invoice-automation.md", "sv": "content/products/sv/invoice-automation.md", "field": "howItWorks.points[1].heading"}, "id": "10"}, {"label": "Point 2 — body", "en": "Stockifi captures the price and quantity of every ingredient on the invoice.", "no": "Stockifi registrerer pris og mengde for hver ingrediens på fakturaen.", "sv": "Stockifi fångar priset och kvantiteten för varje ingrediens på fakturan.", "src": {"no": "content/products/no/invoice-automation.md", "sv": "content/products/sv/invoice-automation.md", "field": "howItWorks.points[1].body"}, "id": "11"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "Nothing slips by", "no": "Ingenting slippes forbi", "sv": "Inget går igenom oläst", "src": {"no": "content/products/no/invoice-automation.md", "sv": "content/products/sv/invoice-automation.md", "field": "benefits[0].heading"}, "id": "12"}, {"label": "Benefit 1 — body", "en": "Every supplier invoice is read and captured.", "no": "Alle leverandørfakturaer leses og registreres.", "sv": "Varje leverantörsfaktura läses och registreras.", "src": {"no": "content/products/no/invoice-automation.md", "sv": "content/products/sv/invoice-automation.md", "field": "benefits[0].body"}, "id": "13"}, {"label": "Benefit 2 — heading", "en": "Always current", "no": "Alltid oppdatert", "sv": "Alltid aktuell", "src": {"no": "content/products/no/invoice-automation.md", "sv": "content/products/sv/invoice-automation.md", "field": "benefits[1].heading"}, "id": "14"}, {"label": "Benefit 2 — body", "en"
