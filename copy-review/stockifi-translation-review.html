v": "content/products/sv/performance-dashboards.md", "field": "metaDescription"}, "id": "1"}]}, {"name": "Hero", "rows": [{"label": "Eyebrow", "en": "Performance dashboards", "no": "Performance-dashboards", "sv": "Prestandadashboards", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "eyebrow"}, "id": "2"}, {"label": "Heading", "en": "Bring food cost and inventory management into one place", "no": "Samle matkostnader og lagerstyring på ett sted", "sv": "Samla varukostnad och lagerhantering på ett ställe", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "heading"}, "id": "3"}, {"label": "Subhead", "en": "See and understand your numbers like never before. Stockifi turns your invoices, sales, and inventory into one clear view of your margins.", "no": "Forstå tallene dine på en ny måte. Stockifi gjør om fakturaer, salg og varetellinger til ett klart bilde av marginene dine.", "sv": "Se och förstå dina siffror på ett nytt sätt. Stockifi omvandlar dina fakturor, försäljning och varulager till en tydlig bild av dina marginaler.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "subhead"}, "id": "4"}]}, {"name": "How it works", "rows": [{"label": "Tagline", "en": "How it works", "no": "Slik fungerer det", "sv": "Så fungerar det", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "howItWorks.tagline"}, "id": "5"}, {"label": "Heading", "en": "Where the numbers come from", "no": "Hvor tallene kommer fra", "sv": "Varifrån siffrorna kommer", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "howItWorks.heading"}, "id": "6"}, {"label": "Body", "en": "Stockifi already holds the pieces that drive your cost. It reads the prices off your supplier invoices and the sales off your POS, weighs them against what your recipes and counts say you used, and turns it all into actionable insights on one screen. You read one clear picture instead of piecing it together from separate systems.", "no": "Stockifi har allerede delene som driver kostnadene dine. Systemet henter priser fra leverandørfakturaene og salg fra kassesystemet ditt, veier dem opp mot hva oppskrifter og tellinger sier du har brukt, og gjør alt om til handlingsdyktig innsikt på én skjerm. Du leser ett tydelig bilde i stedet for å sette det sammen fra ulike systemer.", "sv": "Stockifi har redan de delar som driver din kostnad. Det läser priserna från dina leverantörsfakturor och försäljningen från ditt kassasystem, väger dem mot vad dina recept och inventeringar säger att du förbrukade, och omvandlar allt till användbara insikter på en skärm. Du läser en tydlig bild i stället för att sätta ihop den från separata system.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "howItWorks.body"}, "id": "7"}, {"label": "Point 1 — heading", "en": "Straight from source", "no": "Direkte fra kilden", "sv": "Direkt från källan", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "howItWorks.points[0].heading"}, "id": "8"}, {"label": "Point 1 — body", "en": "Invoices come from your accounting, sales from your POS.", "no": "Fakturaer hentes fra regnskapssystemet, salg fra kassesystemet ditt.", "sv": "Fakturor hämtas från din redovisning, försäljning från ditt kassasystem.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "howItWorks.points[0].body"}, "id": "9"}, {"label": "Point 2 — heading", "en": "Worked out for you", "no": "Regnet ut for deg", "sv": "Beräknat åt dig", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "howItWorks.points[1].heading"}, "id": "10"}, {"label": "Point 2 — body", "en": "Stockifi does the calculating, with no report to build by hand.", "no": "Stockifi gjør beregningene, uten at du trenger å bygge rapporter manuelt.", "sv": "Stockifi sköter beräkningarna, utan att du behöver bygga rapporter för hand.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "howItWorks.points[1].body"}, "id": "11"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "All the reports", "no": "Alle rapportene", "sv": "Alla rapporter", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "benefits[0].heading"}, "id": "12"}, {"label": "Benefit 1 — body", "en": "It covers COGS development, variance, over-portioning, and supplier price moves.", "no": "Dekker varekostutvikling, avvik, overporsjoning og prisendringer fra leverandører.", "sv": "Det täcker råvarukostnadsutveckling, avvikelse, överportering och leverantörsprisrörelser.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "benefits[0].body"}, "id": "13"}, {"label": "Benefit 2 — heading", "en": "Drill and compare", "no": "Drill ned og sammenlign", "sv": "Gräv och jämför", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "benefits[1].heading"}, "id": "14"}, {"label": "Benefit 2 — body", "en": "Go across site, period, and dish, or compare your locations.", "no": "Se på tvers av lokasjon, periode og rett, eller sammenlign stedene dine.", "sv": "Filtrera per plats, period och rätt, eller jämför dina restauranger.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "benefits[1].body"}, "id": "15"}, {"label": "Benefit 3 — heading", "en": "Up to date", "no": "Alltid oppdatert", "sv": "Alltid uppdaterat", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "benefits[2].heading"}, "id": "16"}, {"label": "Benefit 3 — body", "en": "The dashboard moves as new invoices and sales land.", "no": "Dashbordet oppdateres når nye fakturaer og salg kommer inn.", "sv": "Dashboarden uppdateras löpande när nya fakturor och försäljningsdata kommer in.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "benefits[2].body"}, "id": "17"}, {"label": "Benefit 4 — heading", "en": "Built in", "no": "Innebygd", "sv": "Inbyggt", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "benefits[3].heading"}, "id": "18"}, {"label": "Benefit 4 — body", "en": "Ready to read in Stockifi, with no separate BI tool or analyst.", "no": "Klar til bruk i Stockifi, uten separate BI-verktøy eller analytiker.", "sv": "Klart att läsa direkt i Stockifi, utan separat BI-verktyg eller analytiker.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "benefits[3].body"}, "id": "19"}]}, {"name": "FAQ", "rows": [{"label": "FAQ 1 — question", "en": "What is COGS development?", "no": "Hva er varekostutvikling?", "sv": "Vad är råvarukostnadsutveckling?", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "faqs[0].question"}, "id": "20"}, {"label": "FAQ 1 — answer", "en": "COGS development is how your cost of goods sold moves over time. Stockifi tracks it alongside food cost and margin, so you see the trend rather than a single month.", "no": "Varekostutvikling viser hvordan vareforbruket ditt beveger seg over tid. Stockifi sporer det sammen med varekostprosent og margin, slik at du ser trenden i stedet for ett enkelt tall.", "sv": "Råvarukostnadsutveckling visar hur din varukostnad rör sig över tid. Stockifi spårar den tillsammans med varukostnadsprocent och marginal, så att du ser trenden snarare än en enstaka månad.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "faqs[0].answer"}, "id": "21"}, {"label": "FAQ 2 — question", "en": "How current are the numbers? Is this real time?", "no": "Hvor oppdaterte er tallene? Er dette i sanntid?", "sv": "Hur aktuella är siffrorna? Är det i realtid?", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "faqs[1].question"}, "id": "22"}, {"label": "FAQ 2 — answer", "en": "Your invoices and sales feed in continuously, so cost and margin reflect your latest data. Stock figures follow your periodic counts rather than live tracking, in line with how Stockifi handles inventory.", "no": "Fakturaer og salg hentes inn løpende, så kostnader og margin speiler de nyeste dataene dine. Lagertall følger de periodiske varetellinger i tråd med hvordan Stockifi håndterer varelager.", "sv": "Dina fakturor och din försäljning matas in löpande, så kostnad och marginal speglar dina senaste uppgifter. Lagersiffror följer dina periodiska inventeringar snarare än realtidsuppföljning, i linje med hur Stockifi hanterar varulager.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "faqs[1].answer"}, "id": "23"}, {"label": "FAQ 3 — question", "en": "Can a head office see every location in one place?", "no": "Kan et hovedkontor se alle lokasjoner samlet?", "sv": "Kan ett huvudkontor se alla restauranger på ett ställe?", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "faqs[2].question"}, "id": "24"}, {"label": "FAQ 3 — answer", "en": "Yes. Groups get a consolidated view across locations, and you can drill into any single site or dish.", "no": "Ja. Kjeder får en samlet oversikt på tvers av lokasjoner, og du kan gå inn på enkeltlokasjon eller enkeltrett.", "sv": "Ja. Grupper får en samlad vy över alla platser, och du kan gå ned på en enskild restaurang eller rätt.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "faqs[2].answer"}, "id": "25"}, {"label": "FAQ 4 — question", "en": "What if I haven't connected all my data yet?", "no": "Hva skjer hvis jeg ikke har koblet til alle datakilder ennå?", "sv": "Vad händer om jag inte har kopplat all data ännu?", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "faqs[3].question"}, "id": "26"}, {"label": "FAQ 4 — answer", "en": "You still get value from what is connected. The picture sharpens as your POS and accounting come online, and Stockifi works with whatever you have running.", "no": "Du får verdi fra det som allerede er koblet til. Bildet blir tydeligere etter hvert som kassesystem og regnskapssystem kobles på, og Stockifi fungerer med det du har.", "sv": "Du får värde från det som är anslutet. Bilden skärps i takt med att ditt kassasystem och din redovisning kopplas på, och Stockifi fungerar med det du har igång.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "faqs[3].answer"}, "id": "27"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "See your numbers without the spreadsheet", "no": "Se tallene dine uten regneark", "sv": "Se dina siffror utan kalkylbladet", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "ctaHeading"}, "id": "28"}, {"label": "Subhead", "en": "Book a short call and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Book en kort samtale, så viser vi deg hva Stockifi avdekker i løpet av de første 30 dagene.", "sv": "Boka ett kort samtal så visar vi vad Stockifi identifierar under dina första 30 dagar.", "src": {"no": "content/products/no/performance-dashboards.md", "sv": "content/products/sv/performance-dashboards.md", "field": "ctaSubhead"}, "id": "29"}]}]}, {"key": "products-profitability", "label": "Profitability Insights", "group": "Products", "sections": [{"name": "Meta", "rows": [{"label": "Meta title", "en": "Restaurant Profitability Software | Stockifi", "no": "Lønnsomhetsprogramvare for restaurant | Stockifi", "sv": "Lönsamhetsprogramvara för restauranger | Stockifi", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "metaTitle"}, "id": "0"}, {"label": "Meta description", "en": "See which dishes earn and which lose money, by location and period, with profitability built on your live food cost rather than estimates.", "no": "Se hvilke retter som tjener penger og hvilke som taper, per sted og periode, med lønnsomhet bygget på din levende matkostnad heller enn estimater.", "sv": "Se marginal per rätt, lokal och period, baserat på din aktuella varukostnad, så att du vet vilka rätter som tjänar pengar och vilka som kostar dig.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "metaDescription"}, "id": "1"}]}, {"name": "Hero", "rows": [{"label": "Eyebrow", "en": "Profitability Insights", "no": "Lønnsomhetsinnsikt", "sv": "Lönsamhetsinsikter", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "eyebrow"}, "id": "2"}, {"label": "Heading", "en": "Know exactly which dishes make you money", "no": "Vit nøyaktig hvilke retter som gir deg penger", "sv": "Vet exakt vilka rätter som ger dig pengar", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "heading"}, "id": "3"}, {"label": "Subhead", "en": "See the real margin on every plate. Stockifi shows what each dish earns, by location and period.", "no": "Se den faktiske marginen på hver rett. Stockifi viser hva hver rett tjener, fordelt på lokasjon og periode.", "sv": "Se den verkliga marginalen per tallrik. Stockifi visar vad varje rätt inbringar, per lokal och period.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "subhead"}, "id": "4"}]}, {"name": "How it works", "rows": [{"label": "Tagline", "en": "How it works", "no": "Slik fungerer det", "sv": "Så här fungerar det", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "howItWorks.tagline"}, "id": "5"}, {"label": "Heading", "en": "How each dish's profit is worked out", "no": "Slik beregnes fortjenesten per rett", "sv": "Hur varje rätts lönsamhet räknas ut", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "howItWorks.heading"}, "id": "6"}, {"label": "Body", "en": "Profit on a dish is simple: what you charged, less what it cost to make. Stockifi keeps both sides live. Your recipe costs update with every supplier price change on your invoices, and your POS feeds in what sold and at what price. The result is the real margin on every dish, plate by plate, instead of one number for the whole menu.", "no": "Fortjenesten på en rett er enkel: hva du tok betalt, minus hva det kostet å lage den. Stockifi holder begge sidene oppdatert. Oppskriftskostnadene dine oppdateres med hver leverandørprisendring på fakturaene, og kassesystemet ditt leverer hva som ble solgt og til hvilken pris. Resultatet er den faktiske marginen på hver rett, tallerken for tallerken, i stedet for ett tall for hele menyen.", "sv": "Lönsamheten för en rätt är enkel: vad du tog betalt minus vad den kostade att göra. Stockifi håller båda sidorna aktuella. Dina receptkostnader uppdateras vid varje leverantörsprisändring på dina fakturor, och ditt kassasystem skickar in vad som såldes och till vilket pris. Resultatet är den verkliga marginalen per rätt, tallrik för tallrik, i stället för ett enda tal för hela menyn.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "howItWorks.body"}, "id": "7"}, {"label": "Point 1 — heading", "en": "Always live", "no": "Alltid oppdatert", "sv": "Alltid aktuellt", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "howItWorks.points[0].heading"}, "id": "8"}, {"label": "Point 1 — body", "en": "Costs and sales update on their own, so margin never goes stale.", "no": "Kostnader og salg oppdateres automatisk, så marginen er aldri utdatert.", "sv": "Kostnader och försäljning uppdateras på egen hand, så marginalen är aldrig inaktuell.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "howItWorks.points[0].body"}, "id": "9"}, {"label": "Point 2 — heading", "en": "Every dish", "no": "Hver enkelt rett", "sv": "Varje rätt", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "howItWorks.points[1].heading"}, "id": "10"}, {"label": "Point 2 — body", "en": "Profit is worked out per plate, across your whole menu.", "no": "Fortjenesten beregnes per tallerken, på tvers av hele menyen din.", "sv": "Lönsamheten räknas ut per tallrik, för hela din meny.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "howItWorks.points[1].body"}, "id": "11"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "Winners and losers", "no": "Vinnere og tapere", "sv": "Vinnare och förlorare", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "benefits[0].heading"}, "id": "12"}, {"label": "Benefit 1 — body", "en": "Promote the dishes that earn and fix the ones that drain margin.", "no": "Fremhev rettene som tjener penger og gjør noe med de som tærer på marginen.", "sv": "Lyft fram rätterna som tjänar pengar och åtgärda dem som dränerar marginalen.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "benefits[0].body"}, "id": "13"}, {"label": "Benefit 2 — heading", "en": "Margin slip caught", "no": "Marginfall fanget opp", "sv": "Marginalfall fångas upp", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "benefits[1].heading"}, "id": "14"}, {"label": "Benefit 2 — body", "en": "Dishes that turn unprofitable as prices climb show up in the period.", "no": "Retter som blir ulønnsomme når prisene stiger, vises i den aktuelle perioden.", "sv": "Rätter som blir olönsamma när priserna stiger syns i perioden.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "benefits[1].body"}, "id": "15"}, {"label": "Benefit 3 — heading", "en": "Site by site", "no": "Lokasjon for lokasjon", "sv": "Lokal för lokal", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "benefits[2].heading"}, "id": "16"}, {"label": "Benefit 3 — body", "en": "For groups, compare profit across locations and find what needs attention.", "no": "For restaurantkjeder kan du sammenligne lønnsomhet på tvers av lokasjoner og se hva som trenger oppmerksomhet.", "sv": "För grupper: jämför lönsamhet mellan lokaler och hitta vad som behöver åtgärdas.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "benefits[2].body"}, "id": "17"}, {"label": "Benefit 4 — heading", "en": "Calls on facts", "no": "Beslutninger basert på fakta", "sv": "Beslut på fakta", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "benefits[3].heading"}, "id": "18"}, {"label": "Benefit 4 — body", "en": "Menu and pricing decisions run on real numbers.", "no": "Meny- og prisingsbeslutninger kjøres på reelle tall.", "sv": "Meny- och prissättningsbeslut bygger på verkliga siffror.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "benefits[3].body"}, "id": "19"}]}, {"name": "FAQ", "rows": [{"label": "FAQ 1 — question", "en": "Does this include labour and overheads?", "no": "Inkluderer dette lønn og faste kostnader?", "sv": "Ingår lönekostnader och overheadkostnader?", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "faqs[0].question"}, "id": "20"}, {"label": "FAQ 1 — answer", "en": "It focuses on food cost: the ingredient margin and contribution of each dish. Labour, rent, and overheads sit outside it, so profitability shows where your menu and food cost stand, rather than a full profit and loss.", "no": "Det fokuserer på varekostnad: ingrediensmarginen og bidraget fra hver rett. Lønn, husleie og faste kostnader er ikke inkludert, så lønnsomheten viser hvor menyen og varekostnaden din står, ikke et fullstendig regnskap.", "sv": "Det fokuserar på varukostnad: ingrediensmarginalen och täckningsbidraget per rätt. Lönekostnader, hyra och overhead ingår inte, så lönsamhetsbilden visar var din meny och varukostnad står, snarare än ett fullständigt resultat.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "faqs[0].answer"}, "id": "21"}, {"label": "FAQ 2 — question", "en": "What is contribution margin?", "no": "Hva er dekningsbidrag?", "sv": "Vad är täckningsbidrag?", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "faqs[1].question"}, "id": "22"}, {"label": "FAQ 2 — answer", "en": "Contribution margin is what a dish brings in after its own ingredient cost. Stockifi shows it per dish, so you can see which items carry the kitchen and which only look profitable.", "no": "Dekningsbidrag er hva en rett bidrar med etter at ingredienskostnaden er trukket fra. Stockifi viser dette per rett, slik at du ser hvilke retter som bærer kjøkkenet og hvilke som bare ser lønnsomme ut.", "sv": "Täckningsbidrag är vad en rätt inbringar efter att dess egna ingredienskostnader dragits av. Stockifi visar det per rätt, så du ser vilka artiklar som bär köket och vilka som bara ser lönsamma ut.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "faqs[1].answer"}, "id": "23"}, {"label": "FAQ 3 — question", "en": "Does profitability need a POS connection?", "no": "Krever lønnsomhet en kassesystemkobling?", "sv": "Kräver lönsamhetsanalysen en kassasystemskoppling?", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "faqs[2].question"}, "id": "24"}, {"label": "FAQ 3 — answer", "en": "Yes. Profit needs your sales, so a POS connection lets Stockifi set what sold, and at what price, against each dish's live cost.", "no": "Ja. Fortjeneste forutsetter salgsdata, så en kassesystemkobling lar Stockifi sette hva som ble solgt, og til hvilken pris, opp mot den levende kostnaden per rett.", "sv": "Ja. Lönsamhet kräver din försäljningsdata, och en koppling till kassasystemet låter Stockifi ställa vad som såldes och till vilket pris mot varje rätts aktuella kostnad.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "faqs[2].answer"}, "id": "25"}, {"label": "FAQ 4 — question", "en": "How often is profit updated?", "no": "Hvor ofte oppdateres lønnsomheten?", "sv": "Hur ofta uppdateras lönsamheten?", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "faqs[3].question"}, "id": "26"}, {"label": "FAQ 4 — answer", "en": "Profit moves as your costs and sales update, so a dish that slips into the red when an ingredient price climbs shows up in the current period.", "no": "Lønnsomheten beveger seg i takt med at kostnader og salg oppdateres, slik at en rett som går i minus når en ingredienspris stiger, vises i den gjeldende perioden.", "sv": "Lönsamheten förändras i takt med att kostnader och försäljning uppdateras, så en rätt som hamnar på minus när ett ingredienspris stiger syns i den aktuella perioden.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "faqs[3].answer"}, "id": "27"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "See which dishes carry your margin", "no": "Se hvilke retter som bærer marginen din", "sv": "Se vilka rätter som bär din marginal", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "ctaHeading"}, "id": "28"}, {"label": "Subhead", "en": "Book a short call and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Bestill en kort samtale, så viser vi deg hva Stockifi avdekker i løpet av de første 30 dagene.", "sv": "Boka ett kort samtal så visar vi dig vad Stockifi lyfter fram under dina första 30 dagar.", "src": {"no": "content/products/no/profitability.md", "sv": "content/products/sv/profitability.md", "field": "ctaSubhead"}, "id": "29"}]}]}, {"key": "products-recipe-building", "label": "Recipe building", "group": "Products", "sections": [{"name": "Meta", "rows": [{"label": "Meta title", "en": "Recipe Costing & Building Software | Stockifi", "no": "Oppskriftskalkylering og -bygging | Stockifi", "sv": "Programvara för receptkalkylering | Stockifi", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "metaTitle"}, "id": "0"}, {"label": "Meta description", "en": "Build your recipes in Stockifi with live ingredient costs from your invoices. Every dish carries its real cost and updates automatically when prices change.", "no": "Bygg oppskriftene dine i Stockifi med levende ingredienspriser fra fakturaene dine. Hver rett bærer den reelle kostnaden og oppdateres automatisk når prisene endres.", "sv": "Bygg dina recept och delrecept på ett ställe, med levande ingredienskostnader från dina fakturor, så att varje rätt bär sin verkliga kostnad och marginal.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "metaDescription"}, "id": "1"}]}, {"name": "Hero", "rows": [{"label": "Eyebrow", "en": "Recipe building", "no": "Oppskriftsbygging", "sv": "Receptbyggande", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "eyebrow"}, "id": "2"}, {"label": "Heading", "en": "Build recipes with live costs attached", "no": "Bygg oppskrifter med live kostnader tilknyttet", "sv": "Bygg recept med levande kostnader kopplade", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "heading"}, "id": "3"}, {"label": "Subhead", "en": "Once your recipes are in, you never cost a dish by hand again. Stockifi pulls each ingredient's price from your invoices, so every dish shows its real cost and margin.", "no": "Når oppskriftene dine er lagt inn, kalkylerer du aldri en rett manuelt igjen. Stockifi henter prisen på hver ingrediens fra fakturaene dine, slik at hver rett viser sin reelle kostnad og margin.", "sv": "När dina recept är inlagda beräknar du aldrig en rätt för hand igen. Stockifi hämtar varje ingrediens pris från dina fakturor, så att varje rätt visar sin verkliga kostnad och marginal.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "subhead"}, "id": "4"}]}, {"name": "How it works", "rows": [{"label": "Tagline", "en": "How it works", "no": "Slik fungerer det", "sv": "Så här fungerar det", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "howItWorks.tagline"}, "id": "5"}, {"label": "Heading", "en": "A dish costs exactly what its ingredients cost you", "no": "En rett koster nøyaktig det ingrediensene koster deg", "sv": "En rätt kostar precis vad dess ingredienser kostar dig", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "howItWorks.heading"}, "id": "6"}, {"label": "Body", "en": "Each ingredient in a recipe links to its real purchase price from your invoices. A prebatch or sub-recipe is costed once and rolls into every dish that uses it, so a dish's cost is the sum of what its ingredients cost you and moves the day a supplier price does.", "no": "Hver ingrediens i en oppskrift er koblet til den faktiske innkjøpsprisen fra fakturaene dine. En prebatch eller deloppskrift kalkuleres én gang og rulles inn i alle retter som bruker den, slik at kostprisen på en rett er summen av hva ingrediensene koster deg og oppdateres den dagen en leverandørpris endres.", "sv": "Varje ingrediens i ett recept länkas till sitt verkliga inköpspris från dina fakturor. En prebatch eller ett delrecept kalkyleras en gång och rullas in i varje rätt som använder det, så att en rätts kostnad är summan av vad dess ingredienser kostar dig och uppdateras den dag ett leverantörspris ändras.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "howItWorks.body"}, "id": "7"}, {"label": "Point 1 — heading", "en": "Priced from invoices", "no": "Priset fra fakturaer", "sv": "Prissatt från fakturor", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "howItWorks.points[0].heading"}, "id": "8"}, {"label": "Point 1 — body", "en": "Each ingredient links to its real purchase price.", "no": "Hver ingrediens er koblet til sin faktiske innkjøpspris.", "sv": "Varje ingrediens länkas till sitt verkliga inköpspris.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "howItWorks.points[0].body"}, "id": "9"}, {"label": "Point 2 — heading", "en": "Sub-recipes roll up", "no": "Deloppskrifter ruller opp", "sv": "Delrecept rullar upp", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "howItWorks.points[1].heading"}, "id": "10"}, {"label": "Point 2 — body", "en": "A prebatch is costed once and cascades into every dish.", "no": "En prebatch kalkuleres én gang og kaskaderer inn i alle retter.", "sv": "En prebatch kalkyleras en gång och kaskaderar in i varje rätt.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "howItWorks.points[1].body"}, "id": "11"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "One recipe library", "no": "Ett oppskriftsbibliotek", "sv": "Ett receptbibliotek", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "benefits[0].heading"}, "id": "12"}, {"label": "Benefit 1 — body", "en": "Built and costed the same way across every location.", "no": "Bygget og kalkulert på samme måte på tvers av alle lokasjoner.", "sv": "Byggt och kalkylerat på samma sätt på varje plats.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "benefits[0].body"}, "id": "13"}, {"label": "Benefit 2 — heading", "en": "Full cost breakdown", "no": "Fullstendig kostnadsoversikt", "sv": "Fullständig kostnadsuppdelning", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "benefits[1].heading"}, "id": "14"}, {"label": "Benefit 2 — body", "en": "See what each ingredient and sub-recipe adds to a dish.", "no": "Se hva hver ingrediens og deloppskrift bidrar med i en rett.", "sv": "Se vad varje ingrediens och delrecept tillför en rätt.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "benefits[1].body"}, "id": "15"}, {"label": "Benefit 3 — heading", "en": "No cost drift", "no": "Ingen kostnadsdrift", "sv": "Ingen kostnadsglidning", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "benefits[2].heading"}, "id": "16"}, {"label": "Benefit 3 — body", "en": "Prices follow your invoices instead of a spreadsheet going stale.", "no": "Priser følger fakturaene dine i stedet for et regneark som blir utdatert.", "sv": "Priserna följer dina fakturor i stället för ett kalkylblad som blir inaktuellt.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "benefits[2].body"}, "id": "17"}, {"label": "Benefit 4 — heading", "en": "We build them in", "no": "Vi bygger dem inn", "sv": "Vi bygger in dem", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "benefits[3].heading"}, "id": "18"}, {"label": "Benefit 4 — body", "en": "You share your recipes and we set them up during onboarding.", "no": "Du deler oppskriftene dine og vi setter dem opp under onboarding.", "sv": "Du delar dina recept och vi ställer in dem under onboarding.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "benefits[3].body"}, "id": "19"}]}, {"name": "FAQ", "rows": [{"label": "FAQ 1 — question", "en": "Do you set up our recipes for us?", "no": "Setter dere opp oppskriftene våre for oss?", "sv": "Ställer ni in våra recept åt oss?", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "faqs[0].question"}, "id": "20"}, {"label": "FAQ 1 — answer", "en": "Yes. You share your recipes and we build them in, with ingredient costs tracked from the start. The manual setup is handled for you.", "no": "Ja. Du deler oppskriftene dine og vi bygger dem inn, med ingredienskostnader sporet fra starten av. Det manuelle oppsettet håndteres for deg.", "sv": "Ja. Du delar dina recept och vi bygger in dem, med ingredienskostnader spårade från start. Den manuella inställningen hanteras åt dig.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "faqs[0].answer"}, "id": "21"}, {"label": "FAQ 2 — question", "en": "How are ingredient costs attached to a recipe?", "no": "Hvordan knyttes ingredienskostnader til en oppskrift?", "sv": "Hur kopplas ingredienskostnader till ett recept?", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "faqs[1].question"}, "id": "22"}, {"label": "FAQ 2 — answer", "en": "Each ingredient in a recipe links to its real purchase price from your invoices, so a recipe's cost is the sum of what those ingredients currently cost you.", "no": "Hver ingrediens i en oppskrift er koblet til den faktiske innkjøpsprisen fra fakturaene dine, slik at kostprisen på en oppskrift er summen av hva de ingrediensene koster deg akkurat nå.", "sv": "Varje ingrediens i ett recept länkas till sitt verkliga inköpspris från dina fakturor, så att ett recepts kostnad är summan av vad de ingredienserna kostar dig just nu.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "faqs[1].answer"}, "id": "23"}, {"label": "FAQ 3 — question", "en": "Do recipes account for prep loss and yield?", "no": "Tar oppskrifter høyde for svinn og utbytte?", "sv": "Tar recepten hänsyn till putsspill och utbyte?", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "faqs[2].question"}, "id": "24"}, {"label": "FAQ 3 — answer", "en": "Yes. You set how much of an ingredient a recipe actually uses, so the trim on something like a whole fish or a primal cut is costed into every portion. That prep loss, or cutaway, lands in your dish cost rather than hiding in variance.", "no": "Ja. Du angir hvor mye av en ingrediens en oppskrift faktisk bruker, slik at trimmingen på for eksempel en hel fisk eller et stykke kjøtt kalkuleres inn i hver porsjon. Det svinnet, eller kuttet, havner i kostnaden på retten i stedet for å forsvinne i avvik.", "sv": "Ja. Du anger hur mycket av en ingrediens ett recept faktiskt använder, så att spillet på till exempel en hel fisk eller ett styckningsblock kalkyleras in i varje portion. Det putsspillet landar i din rättkostnad i stället för att gömma sig i avvikelsen.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "faqs[2].answer"}, "id": "25"}, {"label": "FAQ 4 — question", "en": "Can I use one recipe library across all my locations?", "no": "Kan jeg bruke ett oppskriftsbibliotek på tvers av alle lokasjonene mine?", "sv": "Kan jag använda ett receptbibliotek på alla mina platser?", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "faqs[3].question"}, "id": "26"}, {"label": "FAQ 4 — answer", "en": "Yes. Your recipes live in one library shared across locations, so a dish is built and costed the same way everywhere, and an update reaches every site.", "no": "Ja. Oppskriftene dine ligger i ett bibliotek som deles på tvers av lokasjoner, slik at en rett er bygget og kalkulert på samme måte overalt, og en oppdatering når alle steder.", "sv": "Ja. Dina recept finns i ett bibliotek som delas på alla platser, så att en rätt byggs och kalkyleras på samma sätt överallt och en uppdatering når varje plats.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "faqs[3].answer"}, "id": "27"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "See your recipes costed live", "no": "Se oppskriftene dine kalkulert live", "sv": "Se dina recept kalkylerade i realtid", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "ctaHeading"}, "id": "28"}, {"label": "Subhead", "en": "Book a short call and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Book en kort samtale, og vi viser deg hva Stockifi avdekker i løpet av de første 30 dagene dine.", "sv": "Boka ett kort samtal så visar vi dig vad Stockifi hittar under dina första 30 dagar.", "src": {"no": "content/products/no/recipe-building.md", "sv": "content/products/sv/recipe-building.md", "field": "ctaSubhead"}, "id": "29"}]}]}, {"key": "products-sales-and-usage", "label": "Sales and usage", "group": "Products", "sections": [{"name": "Meta", "rows": [{"label": "Meta title", "en": "Restaurant Sales & Ingredient Usage Tracking | Stockifi", "no": "Sporing av restaurantsalg og ingrediensforbruk | Stockifi", "sv": "Försäljning och förbrukning | Stockifi", "src": {"no": "content/products/no/sales-and-usage.md", "sv": "content/products/sv/sales-and-usage.md", "field": "metaTitle"}, "id": "0"}, {"label": "Meta description", "en": "Stockifi connects your POS sales to actual ingredient consumption and shows you what was used versus what should have been, and where the gap sits.", "no": "Stockifi kobler kassasalgene dine til faktisk ingrediensforbruk og viser deg hva som ble brukt kontra hva som skulle vært brukt, og hvor gapet ligger.", "sv": "Se vad som såldes och hur det rörde sig genom ditt varulager — Stockifi kopplar ditt kassasystems försäljning till faktisk ingrediensförbrukning.", "src": {"no": "content/products/no/sales-and-usage.md", "sv": "content/products/sv/sales-and-usage.md", "field": "
