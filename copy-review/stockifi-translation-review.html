en stämmer", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "howItWorks.heading"}, "id": "6"}, {"label": "Body", "en": "You count on the phone or tablet your team already carries, in the order your shelves are arranged, online or off. Before it closes, Stockifi flags anything that looks off, like an unusually high or low figure on an item, so a likely miskey gets caught. Only a verified count locks in your stock for the period.", "no": "Du teller på telefonen eller nettbrettet teamet allerede har, i den rekkefølgen hyllene er arrangert, online eller offline. Før tellingen lukkes, markerer Stockifi alt som ser rart ut, for eksempel et uvanlig høyt eller lavt tall på en vare, slik at et sannsynlig feiltast blir fanget opp. Bare en verifisert telling låser varelageret for perioden.", "sv": "Du inventerar på den telefon eller surfplatta ditt team redan använder, i den ordning dina hyllor är uppställda, online eller offline. Innan den stängs flaggar Stockifi allt som ser konstigt ut, till exempel ett ovanligt högt eller lågt tal för en artikel, så att ett sannolikt felslag fångas upp. Bara en verifierad inventering låser ditt varulager för perioden.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "howItWorks.body"}, "id": "7"}, {"label": "Point 1 — heading", "en": "In shelf order", "no": "Etter hyllerekkefølge", "sv": "I hyllordning", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "howItWorks.points[0].heading"}, "id": "8"}, {"label": "Point 1 — body", "en": "Counting follows how your shelves are arranged.", "no": "Tellingen følger hvordan hyllene dine er arrangert.", "sv": "Inventeringen följer hur dina hyllor är uppställda.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "howItWorks.points[0].body"}, "id": "9"}, {"label": "Point 2 — heading", "en": "Verified, then locked", "no": "Verifisert, deretter låst", "sv": "Verifierad, sedan låst", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "howItWorks.points[1].heading"}, "id": "10"}, {"label": "Point 2 — body", "en": "Odd figures are flagged before the count closes.", "no": "Merkelige tall flagges før tellingen lukkes.", "sv": "Avvikande siffror flaggas innan inventeringen stängs.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "howItWorks.points[1].body"}, "id": "11"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "Count 10x faster", "no": "Tell 10 ganger raskere", "sv": "Inventera 10 gånger snabbare", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "benefits[0].heading"}, "id": "12"}, {"label": "Benefit 1 — body", "en": "On a phone instead of a clipboard, a count takes a fraction of the time.", "no": "På en telefon i stedet for en klemmappe tar en telling bare en brøkdel av tiden.", "sv": "Med en telefon istället för ett urklipp tar en inventering en bråkdel av tiden.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "benefits[0].body"}, "id": "13"}, {"label": "Benefit 2 — heading", "en": "Works offline", "no": "Fungerer offline", "sv": "Fungerar offline", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "benefits[1].heading"}, "id": "14"}, {"label": "Benefit 2 — body", "en": "Counts keep running with no signal and sync once you reconnect.", "no": "Tellinger fortsetter uten signal og synkroniseres når du kobler til igjen.", "sv": "Inventeringar fortsätter utan signal och synkroniseras när du återansluter.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "benefits[1].body"}, "id": "15"}, {"label": "Benefit 3 — heading", "en": "Variance you trust", "no": "Avvik du kan stole på", "sv": "Avvikelse du litar på", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "benefits[2].heading"}, "id": "16"}, {"label": "Benefit 3 — body", "en": "Counts feed straight into variance, so the number reflects real stock.", "no": "Tellinger mates direkte inn i avviksberegningen, slik at tallet gjenspeiler faktisk varelager.", "sv": "Inventeringar matas direkt in i avvikelseanalysen, så siffran speglar det faktiska varulagret.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "benefits[2].body"}, "id": "17"}, {"label": "Benefit 4 — heading", "en": "One source", "no": "Én kilde", "sv": "En källa", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "benefits[3].heading"}, "id": "18"}, {"label": "Benefit 4 — body", "en": "Every count lives in Stockifi, with no separate version to reconcile.", "no": "Alle tellinger ligger i Stockifi, uten separate versjoner å avstemme.", "sv": "Varje inventering finns i Stockifi, utan någon separat version att stämma av.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "benefits[3].body"}, "id": "19"}]}, {"name": "FAQ", "rows": [{"label": "FAQ 1 — question", "en": "Can I count stock on my own schedule?", "no": "Kan jeg telle varelager etter min egen plan?", "sv": "Kan jag inventera på mitt eget schema?", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "faqs[0].question"}, "id": "20"}, {"label": "FAQ 1 — answer", "en": "Yes. Stockifi uses periodic stock counts with variance analysis in the app. You count when it suits you, then see actual usage against what your recipes predicted.", "no": "Ja. Stockifi bruker periodiske varetellinger med avviksanalyse i appen. Du teller når det passer deg, og ser deretter faktisk forbruk mot hva oppskriftene forutsa.", "sv": "Ja. Stockifi använder periodiska inventeringar med avvikelseanalys i appen. Du inventerar när det passar dig och ser sedan faktisk användning mot vad dina recept förutsåg.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "faqs[0].answer"}, "id": "21"}, {"label": "FAQ 2 — question", "en": "How often should I count stock?", "no": "Hvor ofte bør jeg telle varelageret?", "sv": "Hur ofta bör jag inventera?", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "faqs[1].question"}, "id": "22"}, {"label": "FAQ 2 — answer", "en": "Most operators count at period close, monthly for many. Stockifi fits whatever periodic cycle you run and shows variance for that period.", "no": "De fleste operatører teller ved periodeslutt, månedlig for mange. Stockifi tilpasser seg den periodiske syklusen du kjører og viser avvik for den perioden.", "sv": "De flesta operatörer inventerar vid periodslutet, månadsvis för många. Stockifi passar vilket periodiskt schema du kör och visar avvikelse för den perioden.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "faqs[1].answer"}, "id": "23"}, {"label": "FAQ 3 — question", "en": "Do I need a barcode scanner or special hardware?", "no": "Trenger jeg en strekkodeskanner eller spesielt utstyr?", "sv": "Behöver jag en streckkodsläsare eller specialutrustning?", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "faqs[2].question"}, "id": "24"}, {"label": "FAQ 3 — answer", "en": "No. Counting runs on the phone or tablet your team already carries, with nothing extra to buy.", "no": "Nei. Telling kjører på telefonen eller nettbrettet teamet allerede har, uten noe ekstra å kjøpe.", "sv": "Nej. Inventering körs på den telefon eller surfplatta ditt team redan använder, utan något extra att köpa.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "faqs[2].answer"}, "id": "25"}, {"label": "FAQ 4 — question", "en": "Can my team split a count between them?", "no": "Kan teamet mitt dele en telling mellom seg?", "sv": "Kan mitt team dela upp en inventering mellan sig?", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "faqs[3].question"}, "id": "26"}, {"label": "FAQ 4 — answer", "en": "Yes. The count can be split across your team and their devices, area by area, and Stockifi brings it together into one count for the period.", "no": "Ja. Tellingen kan deles mellom teammedlemmene og enhetene deres, område for område, og Stockifi samler det til én telling for perioden.", "sv": "Ja. Inventeringen kan delas upp mellan ditt team och deras enheter, område för område, och Stockifi sammanställer det till en inventering för perioden.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "faqs[3].answer"}, "id": "27"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "See your real stock on hand", "no": "Se det faktiske varelageret ditt", "sv": "Se ditt faktiska varulager", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "ctaHeading"}, "id": "28"}, {"label": "Subhead", "en": "Book a short call and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Book en kort samtale, så viser vi deg hva Stockifi avdekker i løpet av de første 30 dagene.", "sv": "Boka ett kort samtal så visar vi vad Stockifi hittar under dina första 30 dagar.", "src": {"no": "content/products/no/stock-counting.md", "sv": "content/products/sv/stock-counting.md", "field": "ctaSubhead"}, "id": "29"}]}]}, {"key": "products-supplier-price-tracking", "label": "Supplier price tracking", "group": "Products", "sections": [{"name": "Meta", "rows": [{"label": "Meta title", "en": "Supplier Price Tracking for Restaurants | Stockifi", "no": "Sporing av leverandørpriser for restauranter | Stockifi", "sv": "Leverantörsprisspårning för restauranger | Stockifi", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "metaTitle"}, "id": "0"}, {"label": "Meta description", "en": "Every time a supplier changes a price, Stockifi catches it from your invoices, re-costs every affected recipe, and flags trends so nothing slips through.", "no": "Hver gang en leverandør endrer en pris, fanger Stockifi det opp fra fakturaene dine, omregner alle berørte oppskrifter og varsler om trender slik at ingenting slipper gjennom.", "sv": "Stockifi spårar varje prisförändring hos dina leverantörer från fakturorna, flaggar överdebitering och trender och räknar om de recept som påverkas, automatiskt.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "metaDescription"}, "id": "1"}]}, {"name": "Hero", "rows": [{"label": "Eyebrow", "en": "Supplier price tracking", "no": "Leverandørprissporing", "sv": "Leverantörsprisspårning", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "eyebrow"}, "id": "2"}, {"label": "Heading", "en": "Know when a supplier price moves", "no": "Se når en leverandørpris endrer seg", "sv": "Vet när ett leverantörspris rör sig", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "heading"}, "id": "3"}, {"label": "Subhead", "en": "A supplier's prices drift in small steps you would never catch by eye. Stockifi tracks every move and the dishes it touches, so you can act on a rise while there's still time.", "no": "Leverandørpriser beveger seg i små steg du aldri ville fanget manuelt. Stockifi sporer hvert prishopp og hvilke retter det påvirker, slik at du kan handle mens det fortsatt er tid.", "sv": "En leverantörs priser förändras i små steg som aldrig syns med blotta ögat. Stockifi spårar varje rörelse och de rätter den berör, så du kan agera på en höjning medan det fortfarande finns tid.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "subhead"}, "id": "4"}]}, {"name": "How it works", "rows": [{"label": "Tagline", "en": "How it works", "no": "Slik fungerer det", "sv": "Så här fungerar det", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "howItWorks.tagline"}, "id": "5"}, {"label": "Heading", "en": "Stockifi watches every price you pay", "no": "Stockifi følger med på hver pris du betaler", "sv": "Stockifi bevakar varje pris du betalar", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "howItWorks.heading"}, "id": "6"}, {"label": "Body", "en": "Supplier prices drift constantly, and most of the movement is too small to notice on any single invoice. Stockifi checks every price against its own history and re-costs the recipes it touches, so a steady climb shows up long before it dents a margin.", "no": "Leverandørpriser endrer seg hele tiden, og det meste av bevegelsen er for lite til å legge merke til på en enkelt faktura. Stockifi sjekker hver pris mot sin egen historikk og oppdaterer kostnadene for oppskriftene det gjelder, slik at en jevn prisstigning vises lenge før den påvirker marginen.", "sv": "Leverantörspriser förändras hela tiden och de flesta rörelserna är för små för att märkas på en enstaka faktura. Stockifi kontrollerar varje pris mot sin egen historik och räknar om de recept det berör, så att en stadig uppgång syns långt innan den skär i marginalen.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "howItWorks.body"}, "id": "7"}, {"label": "Point 1 — heading", "en": "Checked against history", "no": "Sjekket mot historikken", "sv": "Jämförs mot historiken", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "howItWorks.points[0].heading"}, "id": "8"}, {"label": "Point 1 — body", "en": "Every price is measured against what that ingredient normally costs.", "no": "Hver pris måles mot hva den ingrediensen normalt koster.", "sv": "Varje pris mäts mot vad den ingrediensen normalt kostar.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "howItWorks.points[0].body"}, "id": "9"}, {"label": "Point 2 — heading", "en": "Recipes re-costed", "no": "Oppskrifter oppdatert", "sv": "Recept räknas om", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "howItWorks.points[1].heading"}, "id": "10"}, {"label": "Point 2 — body", "en": "When a price moves, the dishes that use it update the same day.", "no": "Når en pris endrer seg, oppdateres rettene som bruker den samme dag.", "sv": "När ett pris rör sig uppdateras de rätter som använder det samma dag.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "howItWorks.points[1].body"}, "id": "11"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "Caught early", "no": "Fanget tidlig", "sv": "Fångat tidigt", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "benefits[0].heading"}, "id": "12"}, {"label": "Benefit 1 — body", "en": "See a rise the day it lands, while you can still act.", "no": "Se en prisstigning den dagen den ankommer, mens du fortsatt kan handle.", "sv": "Se en höjning den dag den kommer in, medan du fortfarande kan agera.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "benefits[0].body"}, "id": "13"}, {"label": "Benefit 2 — heading", "en": "The full history", "no": "Hele historikken", "sv": "Hela historiken", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "benefits[1].heading"}, "id": "14"}, {"label": "Benefit 2 — body", "en": "Every ingredient keeps the record of what you pay.", "no": "Hver ingrediens beholder oversikten over hva du betaler.", "sv": "Varje ingrediens sparar ett register över vad du betalar.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "benefits[1].body"}, "id": "15"}, {"label": "Benefit 3 — heading", "en": "Ready to negotiate", "no": "Klar til forhandling", "sv": "Redo att förhandla", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "benefits[2].heading"}, "id": "16"}, {"label": "Benefit 3 — body", "en": "Walk into a supplier chat with the trend in hand.", "no": "Gå inn i leverandørmøtet med pristrenden klar.", "sv": "Gå in i ett leverantörsmöte med trenden i handen.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "benefits[2].body"}, "id": "17"}, {"label": "Benefit 4 — heading", "en": "Across every site", "no": "På tvers av alle steder", "sv": "Över alla anläggningar", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "benefits[3].heading"}, "id": "18"}, {"label": "Benefit 4 — body", "en": "A shared supplier's rise re-costs every site at once.", "no": "En prisøkning fra en felles leverandør oppdaterer kostnadene på alle lokasjoner samtidig.", "sv": "En delad leverantörs höjning räknar om varje anläggning på en gång.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "benefits[3].body"}, "id": "19"}]}, {"name": "FAQ", "rows": [{"label": "FAQ 1 — question", "en": "How does Stockifi tell a normal price rise from an overcharge?", "no": "Hvordan skiller Stockifi mellom en normal prisøkning og en feilbelastning?", "sv": "Hur vet Stockifi om en prishöjning är normal eller en överdebitering?", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "faqs[0].question"}, "id": "20"}, {"label": "FAQ 1 — answer", "en": "It checks each charge against the ingredient's own price history. A rise that fits the trend passes without fuss. One that jumps above it is flagged for you to query.", "no": "Den sjekker hvert beløp mot ingrediensens egen prishistorikk. En økning som passer trenden passerer uten varsel. En som hopper over den, flagges slik at du kan undersøke.", "sv": "Det kontrollerar varje debitering mot ingrediensens egen prishistorik. En höjning som passar trenden passerar utan märkning. En som hoppar över den flaggas för dig att ifrågasätta.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "faqs[0].answer"}, "id": "21"}, {"label": "FAQ 2 — question", "en": "How far back does the price history go?", "no": "Hvor langt tilbake går prishistorikken?", "sv": "Hur långt tillbaka sträcker sig prishistoriken?", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "faqs[1].question"}, "id": "22"}, {"label": "FAQ 2 — answer", "en": "The history builds from the first invoice Stockifi reads and grows with every invoice after, so the record gets richer the longer you run it.", "no": "Historikken bygges fra den første fakturaen Stockifi leser og vokser med hver faktura etter det, slik at oversikten blir rikere jo lenger du bruker systemet.", "sv": "Historiken byggs från den första faktura Stockifi läser och växer med varje faktura därefter, så registret blir rikare ju längre du kör det.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "faqs[1].answer"}, "id": "23"}, {"label": "FAQ 3 — question", "en": "Does this work across several locations?", "no": "Fungerer dette på tvers av flere lokasjoner?", "sv": "Fungerar det över flera anläggningar?", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "faqs[2].question"}, "id": "24"}, {"label": "FAQ 3 — answer", "en": "Yes. For a group, every site's invoices feed one price history, so a rise from a shared supplier is caught once and re-costs every location.", "no": "Ja. For en kjede samles fakturaene fra alle steder i én felles prishistorikk, slik at en prisøkning fra en felles leverandør fanges opp én gang og oppdaterer kostnadene på alle lokasjoner.", "sv": "Ja. För en grupp matar varje anläggnings fakturor in i en gemensam prishistorik, så en höjning från en delad leverantör fångas en gång och räknar om varje anläggning.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "faqs[2].answer"}, "id": "25"}, {"label": "FAQ 4 — question", "en": "Which accounting systems does this work with?", "no": "Hvilke regnskapssystemer fungerer dette med?", "sv": "Vilka redovisningssystem fungerar det med?", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "faqs[3].question"}, "id": "26"}, {"label": "FAQ 4 — answer", "en": "Stockifi connects with the accounting systems you already use. Tell us what you run and we will confirm it on a quick call.", "no": "Stockifi kobler seg til regnskapssystemene du allerede bruker. Fortell oss hva du kjører, så bekrefter vi det på en kort samtale.", "sv": "Stockifi kopplas till de redovisningssystem du redan använder. Berätta vilket du kör så bekräftar vi det på ett kort samtal.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "faqs[3].answer"}, "id": "27"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "See what your suppliers are really charging", "no": "Se hva leverandørene dine faktisk tar betalt", "sv": "Se vad dina leverantörer faktiskt debiterar", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "ctaHeading"}, "id": "28"}, {"label": "Subhead", "en": "Book a short call and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Bestill en kort samtale, så viser vi deg hva Stockifi avdekker i de første 30 dagene.", "sv": "Boka ett kort samtal så visar vi dig vad Stockifi hittar under dina första 30 dagar.", "src": {"no": "content/products/no/supplier-price-tracking.md", "sv": "content/products/sv/supplier-price-tracking.md", "field": "ctaSubhead"}, "id": "29"}]}]}, {"key": "products-variance-analysis", "label": "Variance analysis", "group": "Products", "sections": [{"name": "Meta", "rows": [{"label": "Meta title", "en": "Food Cost Variance Analysis for Restaurants | Stockifi", "no": "Avviksanalyse av matkostnad for restauranter | Stockifi", "sv": "Avvikelseanalys av varukostnad för restauranger | Stockifi", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "metaTitle"}, "id": "0"}, {"label": "Meta description", "en": "See your theoretical food cost against your actual, and find exactly where margin leaks, by dish and ingredient, across your recipes, sales, and counts.", "no": "Se den teoretiske matkostnaden opp mot den faktiske og finn nøyaktig hvor marginen lekker, per rett og ingrediens, på tvers av oppskrifter, salg og tellingene.", "sv": "Jämför teoretisk mot faktisk varukostnad och se exakt var marginalen försvinner, rätt ned på rätt och ingrediens, utifrån dina recept, försäljning och inventeringar.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "metaDescription"}, "id": "1"}]}, {"name": "Hero", "rows": [{"label": "Eyebrow", "en": "Variance analysis", "no": "Avviksanalyse", "sv": "Avvikelseanalys", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "eyebrow"}, "id": "2"}, {"label": "Heading", "en": "Find out where your margin is going", "no": "Finn ut hvor marginene dine tar veien", "sv": "Ta reda på var din marginal tar vägen", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "heading"}, "id": "3"}, {"label": "Subhead", "en": "Stockifi compares what your recipes say you should use with what you actually used, dish by dish. Every gap comes with a cause you can act on.", "no": "Stockifi sammenligner hva oppskriftene dine sier du burde ha brukt med hva du faktisk brukte, rett for rett. Hvert avvik kommer med en årsak du kan handle på.", "sv": "Stockifi jämför vad dina recept säger att du borde ha använt med vad du faktiskt använde, rätt ned per rätt. Varje avvikelse kommer med en orsak du kan agera på.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "subhead"}, "id": "4"}]}, {"name": "How it works", "rows": [{"label": "Tagline", "en": "How it works", "no": "Slik fungerer det", "sv": "Så här fungerar det", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "howItWorks.tagline"}, "id": "5"}, {"label": "Heading", "en": "How the gap is worked out", "no": "Slik beregnes avviket", "sv": "Hur avvikelsen räknas ut", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "howItWorks.heading"}, "id": "6"}, {"label": "Body", "en": "Stockifi works out two numbers for every dish: what it should have used, and what it actually used. The first comes from your recipes and sales, the second from your counts and invoices. The difference is your variance, and it shows you exactly where your margin is going.", "no": "Stockifi beregner to tall for hver rett: hva den burde ha brukt, og hva den faktisk brukte. Det første hentes fra oppskriftene og salget ditt, det andre fra varetellingene og fakturaene dine. Forskjellen er avviket ditt, og det viser deg nøyaktig hvor marginene dine tar veien.", "sv": "Stockifi räknar ut två tal för varje rätt: vad som borde ha använts och vad som faktiskt användes. Det första hämtas från dina recept och din försäljning, det andra från dina inventeringar och fakturor. Skillnaden är din avvikelse och visar exakt var marginalen tar vägen.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "howItWorks.body"}, "id": "7"}, {"label": "Point 1 — heading", "en": "Cause attached", "no": "Årsak inkludert", "sv": "Orsak kopplad", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "howItWorks.points[0].heading"}, "id": "8"}, {"label": "Point 1 — body", "en": "Each gap shows what drove it.", "no": "Hvert avvik viser hva som drev det.", "sv": "Varje avvikelse visar vad som orsakade den.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "howItWorks.points[0].body"}, "id": "9"}, {"label": "Point 2 — heading", "en": "Every count period", "no": "Hver telleperiode", "sv": "Varje inventeringsperiod", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "howItWorks.points[1].heading"}, "id": "10"}, {"label": "Point 2 — body", "en": "You see the variance the moment you close a count.", "no": "Du ser avviket i det du lukker en varetelling.", "sv": "Du ser avvikelsen direkt när du stänger en inventering.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "howItWorks.points[1].body"}, "id": "11"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "Over-portioning", "no": "Overporsjoning", "sv": "Överportering", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "benefits[0].heading"}, "id": "12"}, {"label": "Benefit 1 — body", "en": "Dishes that use more than their recipe show up by item.", "no": "Retter som bruker mer enn oppskriften viser, sortert per vare.", "sv": "Rätter som förbrukar mer än receptet anger visas per artikel.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "benefits[0].body"}, "id": "13"}, {"label": "Benefit 2 — heading", "en": "Undefined sales", "no": "Udefinert salg", "sv": "Okopplad försäljning", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "benefits[1].heading"}, "id": "14"}, {"label": "Benefit 2 — body", "en": "Sales that never mapped to a recipe surface, so usage reconciles.", "no": "Salg som ikke er koblet til en oppskrift dukker opp, slik at forbruket stemmer.", "sv": "Försäljning som aldrig kopplats till ett recept synliggörs så att förbrukningen stämmer.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "benefits[1].body"}, "id": "15"}, {"label": "Benefit 3 — heading", "en": "Costed wastage", "no": "Kostnadsført svinn", "sv": "Kostnadsatt svinn", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "benefits[2].heading"}, "id": "16"}, {"label": "Benefit 3 — body", "en": "Captured waste explains part of the gap with a real number.", "no": "Registrert svinn forklarer deler av avviket med et faktisk tall.", "sv": "Registrerat svinn förklarar en del av avvikelsen med ett verkligt tal.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "benefits[2].body"}, "id": "17"}, {"label": "Benefit 4 — heading", "en": "Price rises", "no": "Prisøkninger", "sv": "Prisökningar", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "benefits[3].heading"}, "id": "18"}, {"label": "Benefit 4 — body", "en": "Supplier increases that widened the gap are flagged.", "no": "Leverandørøkninger som har utvidet avviket blir flagget.", "sv": "Leverantörshöjningar som vidgat avvikelsen flaggas.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "benefits[3].body"}, "id": "19"}]}, {"name": "FAQ", "rows": [{"label": "FAQ 1 — question", "en": "Why is there always some variance?", "no": "Hvorfor er det alltid noe avvik?", "sv": "Varför finns det alltid en viss avvikelse?", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "faqs[0].question"}, "id": "20"}, {"label": "FAQ 1 — answer", "en": "Some gap is normal. Portioning, trim, and small losses happen in any kitchen. Stockifi shows you the size of the gap and what is driving it, so you act on the part that is costing you rather than chase a perfect number.", "no": "Et visst avvik er normalt. Porsjonering, trimming og små tap skjer på ethvert kjøkken. Stockifi viser deg størrelsen på avviket og hva som driver det, slik at du kan handle på det som faktisk koster deg penger fremfor å jage et perfekt tall.", "sv": "En viss avvikelse är normal. Portering, putsning och små förluster uppstår i alla kök. Stockifi visar hur stor avvikelsen är och vad som driver den, så att du kan agera på det som faktiskt kostar pengar i stället för att jaga ett perfekt tal.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "faqs[0].answer"}, "id": "21"}, {"label": "FAQ 2 — question", "en": "What do I need in place for variance to work?", "no": "Hva trenger jeg på plass for at avviksanalysen skal fungere?", "sv": "Vad behöver jag ha på plats för att avvikelseanalysen ska fungera?", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "faqs[1].question"}, "id": "22"}, {"label": "FAQ 2 — answer", "en": "Four things Stockifi already brings together: your recipes, your POS sales, your stock counts, and your supplier invoices. With those connected, the gap is worked out for every item.", "no": "Fire ting som Stockifi allerede samler: oppskriftene dine, POS-salget, varetellingene og leverandørfakturaene. Når disse er koblet sammen, beregnes avviket for hver enkelt vare.", "sv": "Fyra saker som Stockifi redan samlar: dina recept, din kassaförsäljning, dina inventeringar och dina leverantörsfakturor. Med dessa kopplade räknas avvikelsen ut för varje artikel.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "faqs[1].answer"}, "id": "23"}, {"label": "FAQ 3 — question", "en": "How accurate is the variance?", "no": "Hvor nøyaktig er avviket?", "sv": "Hur exakt är avvikelsen?", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "faqs[2].question"}, "id": "24"}, {"label": "FAQ 3 — answer", "en": "It is as accurate as your recipes, counts, and invoices, all of which Stockifi keeps current, so the number reflects real usage rather than a transcription error.", "no": "Det er like nøyaktig som oppskriftene, tellingene og fakturaene dine, som Stockifi holder oppdatert, slik at tallet gjenspeiler faktisk forbruk fremfor en inntastingsfeil.", "sv": "Den är lika exakt som dina recept, inventeringar och fakturor, som Stockifi håller aktuella, så att talet speglar verklig förbrukning snarare än ett inmatningsfel.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "faqs[2].answer"}, "id": "25"}, {"label": "FAQ 4 — question", "en": "How often do I see variance?", "no": "Hvor ofte ser jeg avviket?", "sv": "Hur ofta ser jag avvikelsen?", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "faqs[3].question"}, "id": "26"}, {"label": "FAQ 4 — answer", "en": "It is worked out for each count period, so you see the gap every time you close a count rather than waiting for the year-end picture.", "no": "Det beregnes for hver telleperiode, så du ser avviket hver gang du lukker en varetelling fremfor å vente på årsavslutningen.", "sv": "Den räknas ut för varje inventeringsperiod, så du ser avvikelsen varje gång du stänger en inventering i stället för att vänta på årsbilden.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "faqs[3].answer"}, "id": "27"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "Close the gap on your margin", "no": "Tett gapet i marginene dine", "sv": "Täpp till glappet i din marginal", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "ctaHeading"}, "id": "28"}, {"label": "Subhead", "en": "Book a short call and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Book en kort samtale, så viser vi deg hva Stockifi avdekker i dine første 30 dager.", "sv": "Boka ett kort samtal så visar vi dig vad Stockifi hittar under dina första 30 dagar.", "src": {"no": "content/products/no/variance-analysis.md", "sv": "content/products/sv/variance-analysis.md", "field": "ctaSubhead"}, "id": "29"}]}]}, {"key": "products-wastage-tracking", "label": "Wastage tracking", "group": "Products", "sections": [{"name": "Meta", "rows": [{"label": "Meta title", "en": "Wastage Tracking for Restaurants | Stockifi", "no": "Svinnregistrering for restauranter | Stockifi", "sv": "Svinnregistrering för restauranger | Stockifi", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "metaTitle"}, "id": "0"}, {"label": "Meta description", "en": "Log spoilage, kitchen mistakes, and over-production against actual consumption. Stockifi puts a real cost on every loss so waste stops hiding in your variance.", "no": "Registrer svinn, kjøkkenfeil og overproduksjon mot faktisk forbruk. Stockifi setter en reell kostnad på hvert tap slik at svinn slutter å gjemme seg i avviket ditt.", "sv": "Sätt ett verkligt kostnadsvärde på spill, köksmisstag och överproduktion mot faktisk förbrukning, så att förlusterna slutar gömma sig i din avvikelse.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "metaDescription"}, "id": "1"}]}, {"name": "Hero", "rows": [{"label": "Eyebrow", "en": "Wastage tracking", "no": "Svinn-sporing", "sv": "Svinnregistrering", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "eyebrow"}, "id": "2"}, {"label": "Heading", "en": "Turn wastage into a number you can act on", "no": "Gjør svinn til et tall du kan handle på", "sv": "Gör svinnet till en siffra du kan agera på", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "heading"}, "id": "3"}, {"label": "Subhead", "en": "Stockifi puts a real cost on what you waste and shows it against what you use, so it stops hiding in your variance.", "no": "Stockifi setter en reell kostnad på det du kaster og viser det mot det du bruker, slik at det slutter å gjemme seg i avviket ditt.", "sv": "Stockifi sätter ett verkligt kostnadsvärde på det du svinnar och visar det mot det du förbrukar, så att det slutar gömma sig i din avvikelse.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "subhead"}, "id": "4"}]}, {"name": "How it works", "rows": [{"label": "Tagline", "en": "How it works", "no": "Slik fungerer det", "sv": "Så fungerar det", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "howItWorks.tagline"}, "id": "5"}, {"label": "Heading", "en": "See the cost in spoilage and mistakes", "no": "Se kostnaden i svinn og feil", "sv": "Se kostnaden i spill och misstag", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "howItWorks.heading"}, "id": "6"}, {"label": "Body", "en": "Plenty of what a kitchen loses never shows up in the numbers. A spoiled case of produce, or a tray dropped on the pass, is real cost that disappears into your variance. Capturing it gives every loss a number, by ingredient.", "no": "Mye av det et kjøkken taper dukker aldri opp i tallene. En ødelagt kasse med råvarer, eller en tallerken som faller på gulvet, er reell kostnad som forsvinner inn i avviket ditt. Når du registrerer det, får hvert tap et tall, per ingrediens.", "sv": "Mycket av det ett kök förlorar syns aldrig i siffrorna. En förstörd låda råvaror eller en bricka som tappas på passagen är en verklig kostnad som försvinner in i din avvikelse. Att registrera det ger varje förlust ett värde, per ingrediens.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "howItWorks.body"}, "id": "7"}, {"label": "Point 1 — heading", "en": "Marked on the spot", "no": "Registrert på stedet", "sv": "Registrerat på plats", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "howItWorks.points[0].heading"}, "id": "8"}, {"label": "Point 1 — body", "en": "Staff mark a loss in the app the moment it happens.", "no": "Ansatte registrerer et tap i appen i det øyeblikket det skjer.", "sv": "Personalen registrerar ett svinn i appen direkt när det händer.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "howItWorks.points[0].body"}, "id": "9"}, {"label": "Point 2 — heading", "en": "Priced at cost", "no": "Priset til innkjøpskost", "sv": "Prissatt till inköpskostnad", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "howItWorks.points[1].heading"}, "id": "10"}, {"label": "Point 2 — body", "en": "Each loss takes the ingredient's current price and feeds your food cost.", "no": "Hvert tap bruker ingrediensens gjeldende pris og påvirker varekostprosenten din.", "sv": "Varje svinn hämtar ingrediensens aktuella pris och matas in i din varukostnad.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "howItWorks.points[1].body"}, "id": "11"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "Every kind of loss", "no": "Alle typer svinn", "sv": "Alla typer av förluster", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "benefits[0].heading"}, "id": "12"}, {"label": "Benefit 1 — body", "en": "Spoilage, kitchen mistakes, and over-production each get costed.", "no": "Matsvinn, kjøkkenfeil og overproduksjon får hver sin kostnad.", "sv": "Spill, köksmisstag och överproduktion kostnadsberäknas var för sig.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "benefits[0].body"}, "id": "13"}, {"label": "Benefit 2 — heading", "en": "Tagged by reason", "no": "Merket med årsak", "sv": "Taggat med orsak", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "benefits[1].heading"}, "id": "14"}, {"label": "Benefit 2 — body", "en": "Every loss carries an ingredient and a reason.", "no": "Hvert tap er knyttet til en ingrediens og en årsak.", "sv": "Varje förlust kopplas till en ingrediens och en orsak.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "benefits[1].body"}, "id": "15"}, {"label": "Benefit 3 — heading", "en": "Explains the gap", "no": "Forklarer gapet", "sv": "Förklarar gapet", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "benefits[2].heading"}, "id": "16"}, {"label": "Benefit 3 — body", "en": "Captured waste explains variance you missed before.", "no": "Registrert svinn forklarer avvik du ikke hadde sett før.", "sv": "Registrerat svinn förklarar avvikelser du inte kunde se tidigare.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "benefits[2].body"}, "id": "17"}, {"label": "Benefit 4 — heading", "en": "The costly few", "no": "De kostbare postene", "sv": "De dyraste posterna", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "benefits[3].heading"}, "id": "18"}, {"label": "Benefit 4 — body", "en": "See which items and reasons cost the most.", "no": "Se hvilke varer og årsaker som koster mest.", "sv": "Se vilka råvaror och orsaker som kostar mest.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "benefits[3].body"}, "id": "19"}]}, {"name": "FAQ", "rows": [{"label": "FAQ 1 — question", "en": "What types of waste can I capture?", "no": "Hvilke typer svinn kan jeg registrere?", "sv": "Vilka typer av svinn kan jag registrera?", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "faqs[0].question"}, "id": "20"}, {"label": "FAQ 1 — answer", "en": "Spoilage, cooking mistakes, and over-production. Each entry is tagged by ingredient and reason, so the cost lands in the right place.", "no": "Matsvinn, tilberedningsfeil og overproduksjon. Hver registrering er merket med ingrediens og årsak, slik at kostnaden havner på riktig sted.", "sv": "Spill, tillagningsmisstag och överproduktion. Varje post taggas med ingrediens och orsak, så att kostnaden hamnar på rätt ställe.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "faqs[0].answer"}, "id": "21"}, {"label": "FAQ 2 — question", "en": "What about prep trim and cutaway, like the off-cuts from a whole fish?", "no": "Hva med skjæretap og putzing, som avskjær fra en hel fisk?", "sv": "Vad gäller för putsrester och skäravfall, som avskär från en hel fisk?", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "faqs[1].question"}, "id": "22"}, {"label": "FAQ 2 — answer", "en": "That is handled by recipe yield rather than waste capture. You set how much of an ingredient a recipe actually uses, and Stockifi costs the trim into every portion for you. Wastage capture is for losses outside the recipe, like spoilage or a dropped tray.", "no": "Det håndteres av oppskriftens utbytte, ikke svinn-registrering. Du setter hvor mye av en ingrediens en oppskrift faktisk bruker, og Stockifi regner inn avskjæret i hver porsjon for deg. Svinn-registrering er for tap utenfor oppskriften, som matsvinn eller en tallerken som faller.", "sv": "Det hanteras via receptets utbyte snarare än svinnregistrering. Du anger hur mycket av en ingrediens ett recept faktiskt använder, och Stockifi räknar in putsförlusten i varje portion. Svinnregistrering är till för förluster utanför receptet, som spill eller en tappad bricka.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "faqs[1].answer"}, "id": "23"}, {"label": "FAQ 3 — question", "en": "How is wastage tracking different from variance analysis?", "no": "Hva er forskjellen på svinn-sporing og avviksanalyse?", "sv": "Hur skiljer sig svinnregistrering från avvikelseanalys?", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "faqs[2].question"}, "id": "24"}, {"label": "FAQ 3 — answer", "en": "Variance is the whole gap between expected and actual usage. Wastage is one cause of it. Capturing waste moves that loss out of the unexplained gap and into a number you can act on.", "no": "Avvik er hele gapet mellom forventet og faktisk forbruk. Svinn er én årsak til det. Når du registrerer svinn, flyttes tapet ut av det uforklarte gapet og inn i et tall du kan handle på.", "sv": "Avvikelse är hela gapet mellan förväntad och faktisk förbrukning. Svinn är en av orsakerna. Att registrera svinn flyttar den förlusten ur det oförklarade gapet och in i en siffra du kan agera på.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "faqs[2].answer"}, "id": "25"}, {"label": "FAQ 4 — question", "en": "Does capturing waste slow the kitchen down?", "no": "Bremser svinn-registrering ned kjøkkenet?", "sv": "Bromsar svinnregistrering köket?", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "faqs[3].question"}, "id": "26"}, {"label": "FAQ 4 — answer", "en": "No. An entry takes seconds on the app, so the line keeps moving and the loss still gets captured.", "no": "Nei. En registrering tar noen sekunder i appen, så linjen fortsetter og tapet blir likevel fanget opp.", "sv": "Nej. En registrering tar sekunder i appen, så linjen håller takten och förlusten fångas ändå.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "faqs[3].answer"}, "id": "27"}, {"label": "FAQ 5 — question", "en": "Do I have to capture every item for it to be worth it?", "no": "Må jeg registrere alle varer for at det skal være verdt det?", "sv": "Måste jag registrera varje post för att det ska vara värt det?", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "faqs[4].question"}, "id": "28"}, {"label": "FAQ 5 — answer", "en": "No. Even capturing your highest-cost items, like proteins, surfaces where most of the money goes, and you can widen it from there.", "no": "Nei. Selv om du bare registrerer de dyreste varene, som proteiner, ser du hvor mesteparten av pengene forsvinner, og du kan utvide derfra.", "sv": "Nej. Även om du bara registrerar dina dyraste råvaror, som proteiner, ser du var det mesta av pengarna försvinner. Sedan kan du bredda det därifrån.", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "faqs[4].answer"}, "id": "29"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "See what waste is really costing you", "no": "Se hva svinn egentlig koster deg", "sv": "Se vad svinnet verkligen kostar dig", "src": {"no": "content/products/no/wastage-tracking.md", "sv": "content/products/sv/wastage-tracking.md", "field": "ctaHeading"}, "id": "30"}, {"label": "Subhead", "en": "Book a short call and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Book en kort samtale, så viser vi deg hva Stockifi avdekker i de første 30 dagene.", "s jør om fakturaene og salget ditt til den reelle kostnaden for hver drink. Du ser hvor marginene dine forsvinner og fanger opp prisøkninger fra leverandører før de koster deg penger.", "sv": "Stockifi omvandlar dina fakturor och försäljning till den faktiska kostnaden för varje dryck. Du ser vart din marginal tar vägen och fångar leverantörsprishöjningar innan de kostar dig.", "src": {"no": "content/solutions/no/bars.md", "sv": "content/solutions/sv/bars.md", "field": "subhead"}, "id": "4"}]}, {"name": "Problem", "rows": [{"label": "Tagline", "en": "Behind the bar", "no": "Bak baren", "sv": "Bakom baren", "src": {"no": "content/solutions/no/bars.md", "sv": "content/solutions/sv/bars.md", "field": "problemTagline"}, "id": "5"}, {"label": "Heading", "en": "Want to know what your bar is really making?", "no": "Vil du vite hva baren din egentlig tjener?", "sv": "Vill du veta vad din bar faktiskt tjänar?", "src": {"no": "content/solutions/no/bars.md", "sv": "content/solutions/sv/bars.md", "field": "problemHeading"}, "id": "6"}, {"label": "Body", "en": "Stockifi works it out for you. It costs every drink from its recipe, tracks spirit and mixer prices as they move, and shows where pouring, waste, and breakage are eating the margin.", "no": "Stockifi regner det ut for deg. Det kostberegner hver drink fra oppskriften, sporer priser på sprit og mixere etter hvert som de endres, og viser hvor skjenking, svinn og brekkasje spiser marginene.", "sv": "Stockifi räknar ut det åt dig. Det kostnadssätter varje dryck utifrån receptet, spårar priser på sprit och mixers när de rör sig, och visar var övertappning, svinn och kassation äter upp marginalen.", "src": {"no": "content/solutions/no/bars.md", "sv": "content/solutions/sv/bars.md", "field": "problemBody"}, "id": "7"}]}, {"name": "Benefits", "rows": [{"label": "Benefit 1 — heading", "en": "Margin on every drink", "no": "Margin på hver drink", "sv": "Marginal på varje dryck", "src": {"no": "content/solutions/no/bars.md", "sv": "cont s.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "metaDescription"}, "id": "1"}]}, {"name": "Hero", "rows": [{"label": "Eyebrow", "en": "Independent restaurants", "no": "Uavhengige restauranter", "sv": "Fristående restauranger", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "eyebrow"}, "id": "2"}, {"label": "Heading", "en": "Run tighter operations without the spreadsheets", "no": "Drev tettere drift uten regneark", "sv": "Effektivare drift utan kalkylbladen", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "heading"}, "id": "3"}, {"label": "Subhead", "en": "Stockifi connects your invoices, POS, and recipes and tracks your real food cost as prices and sales change. You see where margin is leaking and close the gap, without the extra admin.", "no": "Stockifi kobler fakturaer, kassesystem og oppskrifter og følger den faktiske varekostprosenten når priser og salg endrer seg. Du ser hvor marginen lekker og kan tette gapet, uten ekstra administrasjon.", "sv": "Stockifi kopplar ihop dina fakturor, kassasystem och recept och spårar din faktiska varukostnad när priser och försäljning förändras. Du ser var marginalen läcker och kan täppa till gapet utan extra administration.", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "subhead"}, "id": "4"}]}, {"name": "Problem", "rows": [{"label": "Tagline", "en": "Your real food cost", "no": "Den faktiske varekostprosenten din", "sv": "Din faktiska varukostnad", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "problemTagline"}, "id": "5"}, {"label": "Heading", "en": "Want the small leaks to stop slipping by?", "no": "Vil du at de små lekkasjene slutter å slippe gjennom?", "sv": "Vill ", "en": "Where your real food cost comes from", "no": "Hvor den faktiske varekostnaden din kommer fra", "sv": "Varifrån din faktiska varukostnad kommer", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "showcaseHeading"}, "id": "17"}, {"label": "Body", "en": "Your real food cost comes from three moving parts: what you bought, what each recipe uses, and what you sold. Stockifi keeps all three current and works the number out for you.", "no": "Den faktiske varekostnaden din kommer fra tre bevegelige deler: hva du kjøpte, hva hver oppskrift bruker, og hva du solgte. Stockifi holder alle tre oppdatert og regner ut tallet for deg.", "sv": "Din faktiska varukostnad kommer från tre rörliga delar: vad du köpte, vad varje recept använder och vad du sålde. Stockifi håller alla tre aktuella och räknar ut talet åt dig.", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "showcaseBody"}, "id": "18"}, {"label": "Sub 1 — heading", "en": "Costed like a kitchen", "no": "Kostnadsberegnet som på et kjøkken", "sv": "Kostnadsberäknat som ett kök", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "showcaseSubs[0].heading"}, "id": "19"}, {"label": "Sub 1 — body", "en": "Recipes, prep, and sub-recipes are costed the way you cook.", "no": "Oppskrifter, forproduksjon og deloppskrifter kostnadsberegnes slik du faktisk lager maten.", "sv": "Recept, förberedelser och delrecept kostnadsberäknas på det sätt du lagar mat.", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "showcaseSubs[0].body"}, "id": "20"}, {"label": "Sub 2 — heading", "en": "No new admin", "no": "Ingen ny administrasjon", "sv": "Ingen ny administration", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "showcaseSubs[1].heading"}, "id": "21"}, {"label": "Sub 2 — body", "en": "It runs on the invoices and sales you already produce.", "no": "Det kjører på fakturaene og salgsdataene du allerede produserer.", "sv": "Det körs på de fakturor och den försäljning du redan producerar.", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "showcaseSubs[1].body"}, "id": "22"}]}, {"name": "FAQ", "rows": [{"label": "FAQ heading", "en": "Questions independents ask", "no": "Spørsmål uavhengige restauranter stiller", "sv": "Frågor fristående restauranger ställer", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "faqHeading"}, "id": "23"}, {"label": "FAQ 1 — question", "en": "Is Stockifi worth it for a single restaurant?", "no": "Er Stockifi verdt det for én enkelt restaurant?", "sv": "Är Stockifi värt det för en enda restaurang?", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "faqs[0].question"}, "id": "24"}, {"label": "FAQ 1 — answer", "en": "Yes, if you have recipes and use accounting or a POS. A 1% improvement in food cost is usually worth far more than the subscription.", "no": "Ja, hvis du har oppskrifter og bruker regnskapsprogram eller kassesystem. En forbedring på 1 % i varekostprosent er som regel langt mer verdt enn abonnementet.", "sv": "Ja, om du har recept och använder bokföring eller ett kassasystem. En förbättring med 1 % i varukostnad är vanligtvis värd långt mer än prenumerationen.", "src": {"no": "content/solutions/no/independent-restaurants.md", "sv": "content/solutions/sv/independent-restaurants.md", "field": "faqs[0].answer"}, "id": "25"}, {"label": "FAQ 2 — question", "en": "How long does setup take?", "no": "Hvor lang tid tar oppsettet?", ry dish and, when a price jumps, exactly which dishes it hits.", "no": "Menybeslutninger baseres på virkelige tall. Du ser marginen på hver rett, og når en pris hopper, ser du nøyaktig hvilke retter det påvirker.", "sv": "Menybeslut fattas utifrån verkliga siffror. Du ser marginalen på varje rätt och, när ett pris stiger, exakt vilka rätter det påverkar.", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "showcaseBody"}, "id": "18"}, {"label": "Sub 1 — heading", "en": "Margin per dish", "no": "Margin per rett", "sv": "Marginal per rätt", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "showcaseSubs[0].heading"}, "id": "19"}, {"label": "Sub 1 — body", "en": "Read what each plate makes on today's prices.", "no": "Se hva hver tallerken gir på dagens priser.", "sv": "Se vad varje tallrik ger på dagens priser.", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "showcaseSubs[0].body"}, "id": "20"}, {"label": "Sub 2 — heading", "en": "Reprice with proof", "no": "Repriser med dokumentasjon", "sv": "Omprisätt med underlag", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "showcaseSubs[1].heading"}, "id": "21"}, {"label": "Sub 2 — body", "en": "See which dishes a price rise hits, and by how much.", "no": "Se hvilke retter en prisøkning treffer, og med hvor mye.", "sv": "Se vilka rätter en prisökning slår mot, och med hur mycket.", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "showcaseSubs[1].body"}, "id": "22"}]}, {"name": "FAQ", "rows": [{"label": "FAQ heading", "en": "Questions head chefs ask", "no": "Spørsmål kjøkkensjefer stiller", "sv": "Frågor kökschefer ställer", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "faqHeading"}, "id": "23"}, {"label": "FAQ 1 — question", "en": "How do recipe costs stay current?", "no": "Hvordan holdes oppskriftskostnadene oppdaterte?", "sv": "Hur hålls receptkostnaderna aktuella?", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "faqs[0].question"}, "id": "24"}, {"label": "FAQ 1 — answer", "en": "Stockifi reads supplier invoices and updates every affected recipe automatically, usually the same day.", "no": "Stockifi leser leverandørfakturaer og oppdaterer alle berørte oppskrifter automatisk, som regel samme dag.", "sv": "Stockifi läser leverantörsfakturor och uppdaterar varje berört recept automatiskt, vanligtvis samma dag.", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "faqs[0].answer"}, "id": "25"}, {"label": "FAQ 2 — question", "en": "Does it handle sub-recipes and prebatches?", "no": "Støtter det del-oppskrifter og prebatcher?", "sv": "Hanterar det delrecept och förberedda satser?", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "faqs[1].question"}, "id": "26"}, {"label": "FAQ 2 — answer", "en": "Yes. A prebatch is costed once and rolls up into every dish that uses it.", "no": "Ja. En prebatch kostes én gang og ruller inn i alle retter som bruker den.", "sv": "Ja. En förberedd sats kostsätts en gång och rullas upp i varje rätt som använder den.", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "faqs[1].answer"}, "id": "27"}, {"label": "FAQ 3 — question", "en": "Can I see which dishes are over-portioning?", "no": "Kan jeg se hvilke retter som overporsjoner?", "sv": "Kan jag se vilka rätter som har överportering?", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "faqs[2].question"}, "id": "28"}, {"label": "FAQ 3 — answer", "en": "Yes. By comparing theoretical against actual usage, Stockifi surfaces the dishes drifting from their recipe.", "no": "Ja. Ved å sammenligne teoretisk mot faktisk forbruk viser Stockifi rettene som avviker fra oppskriften.", "sv": "Ja. Genom att jämföra teoretisk mot faktisk förbrukning lyfter Stockifi fram de rätter som avviker från receptet.", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "faqs[2].answer"}, "id": "29"}, {"label": "FAQ 4 — question", "en": "Is counting quick?", "no": "Går varetelling raskt?", "sv": "Går inventeringen snabbt?", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "faqs[3].question"}, "id": "30"}, {"label": "FAQ 4 — answer", "en": "Yes. Count on your phone, in the order your kitchen is organised, and it feeds straight into variance.", "no": "Ja. Tell på telefonen i den rekkefølgen kjøkkenet ditt er organisert, og det går rett inn i avviksrapporten.", "sv": "Ja. Inventera med mobilen, i den ordning ditt kök är organiserat, och det matas direkt in i avvikelseanalysen.", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "faqs[3].answer"}, "id": "31"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "Keep the kitchen's costs live", "no": "Hold kjøkkenets kostnader oppdaterte", "sv": "Håll kökets kostnader levande", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "ctaHeading"}, "id": "32"}, {"label": "Subhead", "en": "Drop your email and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Legg igjen e-posten din, så viser vi deg hva Stockifi avdekker i de første 30 dagene.", "sv": "Lämna din e-post så visar vi vad Stockifi hittar under dina första 30 dagar.", "src": {"no": "content/solutions/no/kitchen.md", "sv": "content/solutions/sv/kitchen.md", "field": "ctaSubhead"}, "id": "33"}]}]}, {"key": "solutions-management", "label": "Management", "group": "Solutions", "sections": [{"name": "Meta", "rows": [{"label": "Meta title", "en": "P ions/sv/management.md", "field": "benefits[1].heading"}, "id": "10"}, {"label": "Benefit 2 — body", "en": "Drill the headline number to the dish, site, or supplier.", "no": "Bor deg ned fra totaltallet til enkeltrett, lokasjon eller leverandør.", "sv": "Borra ner från siffran till rätten, stället eller leverantören.", "src": {"no": "content/solutions/no/management.md", "sv": "content/solutions/sv/management.md", "field": "benefits[1].body"}, "id": "11"}, {"label": "Benefit 3 — heading", "en": "Decisions on facts", "no": "Beslutninger basert på fakta", "sv": "Beslut på fakta", "src": {"no": "content/solutions/no/management.md", "sv": "content/solutions/sv/management.md", "field": "benefits[2].heading"}, "id": "12"}, {"label": "Benefit 3 — body", "en": "Walk in with this week's real numbers.", "no": "Gå inn i møtet med ukens faktiske tall.", "sv": "Gå in med veckans verkliga siffror.", "src": {"no": "content/solutions/no/management.md", "sv": "content/solutions/sv/management.md", "field": "benefits[2].body"}, "id": "13"}, {"label": "Benefit 4 — heading", "en": "Every location", "no": "Alle lokasjoner", "sv": "Alla enheter", "src": {"no": "content/solutions/no/management.md", "sv": "content/solutions/sv/management.md", "field": "benefits[3].heading"}, "id": "14"}, {"label": "Benefit 4 — body", "en": "A consolidated view across all your sites.", "no": "En samlet oversikt på tvers av alle steder.", "sv": "En samlad vy över alla dina ställen.", "src": {"no": "content/solutions/no/management.md", "sv": "content/solutions/sv/management.md", "field": "benefits[3].body"}, "id": "15"}]}, {"name": "Showcase", "rows": [{"label": "Tagline", "en": "How it helps", "no": "Slik hjelper det", "sv": "Hur det hjälper", "src": {"no": "content/solutions/no/management.md", "sv": "content/solutions/sv/management.md", "field": "showcaseTagline"}, "id": "16"}, {"label": "Heading", "en": "What changes for owners and GMs?", "no": "Hva endrer seg for eiere og daglige ledere?", "sv": "Vad förändras för ägare och GMs?", "src": {"no": "content/solutions/no/management.md", "sv": "content/solutions/sv/management.md", "field": "showcaseHeading"}, "id": "17"}, {"label": "Body", "en": "You catch a problem while the month is still open. The read updates through the period, so a slipping margin is something you can fix in time.", "no": "Du oppdager et problem mens måneden fortsatt er åpen. Oversikten oppdateres løpende gjennom perioden, så en synkende margin er noe du rekker å gjøre noe med.", "sv": "Du fångar ett problem medan månaden fortfarande är öppen. Bilden uppdateras löpande under perioden, så en sjunkande marginal är något du kan åtgärda i tid.", "src": {"no": "content/solutions/no/management.md", "sv": "content/solutions/sv/management.md", "field": "showcaseBody"}, "id": "18"}, {"label": "Sub 1 — heading", "en": "Act in time", "no": "Handle i tide", "sv": "Agera i tid", "src": {"no": "content/solutions/no/management.md", "sv": "content/solutions/sv/management.md", "field": "showcaseSubs[0].heading"}, "id": "19"}, {"label": "Sub 1 — body", "en": "See a slip during the period, while you can still act.", "no": "Se et avvik i løpet av perioden, mens du fortsatt kan gjøre noe med det.", "sv": "Se ett tapp under perioden, medan du fortfarande kan göra något åt det.", "src": {"no": "content/solutions/no/management.md", "sv": "content/solutions/sv/management.md", "field": "showcaseSubs[0].body"}, "id": "20"}, {"label": "Sub 2 — heading", "en": "Where to look", "no": "Hvor du skal se", "sv": "Var du ska titta", "src": {"no": "content/solutions/no/management.md", "sv": "content/solutions/sv/management.md", "field": "showcaseSubs[1].heading"}, "id": "21"}, {"label": "Sub 2 — body", "en": "For a group, the read points you to the site that needs attention.", "no": "For en kjede peker oversikten deg mot lokasjonen som trenger oppmerksomhet.", "sv": "För en grupp pekar bilden ut vilket ställe som behöver uppmärksamhet.", "src": {"no": "content/solutions/no/management.md" allt.", "src": {"no": "content/solutions/no/restaurant-groups.md", "sv": "content/solutions/sv/restaurant-groups.md", "field": "faqs[0].answer"}, "id": "25"}, {"label": "FAQ 2 — question", "en": "Can recipe costs stay consistent across sites?", "no": "Kan oppskriftskostnadene holdes konsistente på tvers av lokasjoner?", "sv": "Kan receptkostnaderna vara konsekventa på alla restauranger?", "src": {"no": "content/solutions/no/restaurant-groups.md", "sv": "content/solutions/sv/restaurant-groups.md", "field": "faqs[1].question"}, "id": "26"}, {"label": "FAQ 2 — answer", "en": "Yes. A recipe is costed once and the same cost applies across every site that uses it, updating for all of them when a supplier price changes.", "no": "Ja. En oppskrift kostsettes én gang og den samme kostnaden gjelder for alle lokasjoner som bruker den, og oppdateres for alle når en leverandørpris endrer seg.", "sv": "Ja. Ett recept kostsätts en gång och samma kostnad gäller för varje restaurang som använder det, och uppdateras för alla när ett leverantörspris ändras.", "src": {"no": "content/solutions/no/restaurant-groups.md", "sv": "content/solutions/sv/restaurant-groups.md", "field": "faqs[1].answer"}, "id": "27"}, {"label": "FAQ 3 — question", "en": "Do you support a central kitchen?", "no": "Støtter dere sentralkjøkken?", "sv": "Stöder ni centralkök?", "src": {"no": "content/solutions/no/restaurant-groups.md", "sv": "content/solutions/sv/restaurant-groups.md", "field": "faqs[2].question"}, "id": "28"}, {"label": "FAQ 3 — answer", "en": "Yes. A central kitchen can supply your outlets as an internal supplier, with its production costs flowing into each site's food cost.", "no": "Ja. Et sentralkjøkken kan forsyne dine utsalgssteder som en intern leverandør, med produksjonskostnadene som flyter inn i hvert steds varekost.", "sv": "Ja. Ett centralkök kan försörja dina restauranger som en intern leverantör, med sina produktionskostnader inräknade i varje restaurangs varukostnad.", "src": {"no": "content/solutions/no/restaurant-groups.md", "sv": "content/solutions/sv/restaurant-groups.md", "field": "faqs[2].answer"}, "id": "29"}, {"label": "FAQ 4 — question", "en": "How does it handle stock moving between sites?", "no": "Hvordan håndterer det varebevegelser mellom lokasjoner?", "sv": "Hur hanteras lagerflyttningar mellan restauranger?", "src": {"no": "content/solutions/no/restaurant-groups.md", "sv": "content/solutions/sv/restaurant-groups.md", "field": "faqs[3].question"}, "id": "30"}, {"label": "FAQ 4 — answer", "en": "Inventory transfers are recorded within each count, so stock that moves between locations does not show up as a false gain or loss.", "no": "Varetransaksjoner mellom lokasjoner registreres innenfor hver varetelling, slik at varer som flyttes mellom steder ikke vises som et falskt overskudd eller tap.", "sv": "Lageröverföringar registreras inom varje inventering, så att varor som flyttas mellan restauranger inte syns som en falsk vinst eller förlust.", "src": {"no": "content/solutions/no/restaurant-groups.md", "sv": "content/solutions/sv/restaurant-groups.md", "field": "faqs[3].answer"}, "id": "31"}]}, {"name": "CTA", "rows": [{"label": "Heading", "en": "See your whole group in one view", "no": "Se hele kjeden din i én visning", "sv": "Se hela din restauranggrupp i en vy", "src": {"no": "content/solutions/no/restaurant-groups.md", "sv": "content/solutions/sv/restaurant-groups.md", "field": "ctaHeading"}, "id": "32"}, {"label": "Subhead", "en": "Drop your email and we'll show you what Stockifi surfaces in your first 30 days.", "no": "Legg igjen e-posten din, så viser vi deg hva Stockifi avdekker i løpet av de første 30 dagene.", "sv": "Lämna din e-postadress så visar vi vad Stockifi hittar under dina första 30 dagar.", "src": {"no": "content/solutions/no/restaurant-groups.md", "sv": "content/solutions/sv/restaurant-groups.md", "field": "ctaSubhead"}, "id": "33"}]}]}]};
const LS_KEY = "stockifi-translation-review-v2";
let store = {}; try{ store = JSON.parse(localStorage.getItem(LS_KEY)||"{}"); }catch(e){ store={}; }
let current = DATA.pages.length ? DATA.pages[0].key : null;

const page = k => DATA.pages.find(p=>p.key===k);
const save = ()=>localStorage.setItem(LS_KEY, JSON.stringify(store));
const curVal=(pk,id,loc,orig)=>(store[pk]&&store[pk][id]&&store[pk][id][loc]!=null)?store[pk][id][loc]:orig;
const edited=(pk,id,loc,orig)=>{const v=curVal(pk,id,loc,orig);return v!==orig&&v.trim()!=="";};
function setVal(pk,id,loc,v){(store[pk]=store[pk]||{});(store[pk][id]=store[pk][id]||{});store[pk][id][loc]=v;save();}
function pageRows(p){return p.sections.flatMap(s=>s.rows);}
function pageEdits(p){let n=0;pageRows(p).forEach(r=>{if(edited(p.key,r.id,"no",r.no))n++;if(edited(p.key,r.id,"sv",r.sv))n++;});return n;}

function renderNav(){
  const q=(document.getElementById("search").value||"").toLowerCase();
  const nav=document.getElementById("nav"); nav.innerHTML="";
  const groups=[...new Set(DATA.pages.map(p=>p.group))];
  groups.forEach(g=>{
    const inG=DATA.pages.filter(p=>p.group===g && p.label.toLowerCase().includes(q));
    if(!inG.length) return;
    const box=document.createElement("div"); box.className="nav-group";
    box.innerHTML="<h2>"+g+"</h2>";
    inG.forEach(p=>{
      const b=document.createElement("button");
      b.className="nav-btn"+(p.key===current?" active":"");
      const n=pageEdits(p);
      b.innerHTML='<span>'+p.label+'</span><span class="badge'+(n?'':' zero')+'">'+n+'</span>';
      b.onclick=()=>{current=p.key;render();};
      box.appendChild(b);
    });
    nav.appendChild(box);
  });
}
const autosize=t=>{t.style.height="auto";t.style.height=t.scrollHeight+"px";};
function render(){
  renderNav();
  const p=page(current); if(!p)return;
  document.getElementById("pageGroup").textContent=p.group;
  document.getElementById("pageTitle").textContent=p.label;
  document.getElementById("pageMeta").textContent=pageRows(p).length+" strings · "+pageEdits(p)+" edited";
  const s=document.getElementById("scroll"); s.innerHTML="";
  p.sections.forEach(sec=>{
    const h=document.createElement("div"); h.className="section-h"; h.textContent=sec.name; s.appendChild(h);
    const head=document.createElement("div"); head.className="rowhead";
    head.innerHTML='<div>Field</div><div>English (reference)</div><div>Norwegian</div><div>Swedish</div>';
    s.appendChild(head);
    sec.rows.forEach(r=>{
      const row=document.createElement("div"); row.className="row";
      const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=r.label; row.appendChild(lbl);
      const en=document.createElement("div"); en.className="en"; en.textContent=r.en; row.appendChild(en);
      ["no","sv"].forEach(loc=>{
        const wrap=document.createElement("div"); wrap.className="fieldwrap";
        const orig=r[loc];
        if(edited(p.key,r.id,loc,orig)) wrap.classList.add("edited");
        const tag=document.createElement("span"); tag.className="tag"; tag.textContent="edited";
        const ta=document.createElement("textarea"); ta.value=curVal(p.key,r.id,loc,orig);
        ta.addEventListener("input",()=>{
          setVal(p.key,r.id,loc,ta.value);
          wrap.classList.toggle("edited",edited(p.key,r.id,loc,orig));
          autosize(ta);
          document.getElementById("pageMeta").textContent=pageRows(p).length+" strings · "+pageEdits(p)+" edited";
          renderNav();
        });
        wrap.appendChild(tag); wrap.appendChild(ta); row.appendChild(wrap);
        requestAnimationFrame(()=>autosize(ta));
      });
      s.appendChild(row);
    });
  });
}
document.getElementById("search").addEventListener("input",renderNav);
document.getElementById("exportBtn").onclick=()=>{
  const changes=[];
  DATA.pages.forEach(p=>pageRows(p).forEach(r=>["no","sv"].forEach(loc=>{
    if(edited(p.key,r.id,loc,r[loc]))
      changes.push({page:p.key,group:p.group,field:r.label,en:r.en,locale:loc,
                    original:r[loc],updated:curVal(p.key,r.id,loc,r[loc]),src:r.src||null});
  })));
  if(!changes.length){alert("No edits yet — nothing to export.");return;}
  const blob=new Blob([JSON.stringify({tool:"stockifi-translation-review",version:2,changes},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="translation-edits.json"; a.click();
};
document.getElementById("resetBtn").onclick=()=>{
  if(!confirm("Clear your edits on this page? (other pages keep theirs)"))return;
  delete store[current]; save(); render();
};
render();
</script>
