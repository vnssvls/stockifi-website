<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stockifi — EN Metadata Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #181818;
      --surface: #212121;
      --surface-2: #2c2c2c;
      --border: rgba(255,255,255,0.08);
      --purple: #BB86FC;
      --text: #FCFBFB;
      --text-muted: rgba(252,251,251,0.45);
      --green: #66BB6A;
      --amber: #FFA726;
      --red: #EF5350;
    }

    body {
      font-family: -apple-system, 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(24,24,24,0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
    }
    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Buttons ── */
    .actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.8; }
    .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-primary   { background: var(--purple); color: #181818; }

    /* ── Section nav ── */
    .section-nav {
      max-width: 860px;
      margin: 0 auto;
      padding: 18px 24px 0;
      display: flex;
      gap: 4px;
    }
    .section-nav a {
      padding: 5px 12px;
      border-radius: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .section-nav a:hover { color: var(--text); background: var(--surface-2); }

    /* ── Main ── */
    main { max-width: 860px; margin: 0 auto; padding: 20px 24px 80px; }

    /* ── Section ── */
    .section { margin-bottom: 48px; }
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-header h2 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--purple);
    }
    .section-header .count { font-size: 12px; color: var(--text-muted); }

    /* ── Card ── */
    .page-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 10px;
    }
    .page-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
    }
    .page-name { font-size: 14px; font-weight: 600; }
    .page-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .badge-live { background: rgba(102,187,106,0.15); color: var(--green); }
    .badge-new  { background: rgba(187,134,252,0.12); color: var(--purple); }
    .page-file {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--surface-2);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 360px;
    }

    /* ── Field ── */
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    .field-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .field-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }
    .char-count {
      font-size: 11px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      transition: color 0.15s;
    }
    .char-count.ok   { color: var(--green); }
    .char-count.warn { color: var(--amber); }
    .char-count.over { color: var(--red); }

    .field input,
    .field textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      resize: vertical;
      transition: border-color 0.15s;
    }
    .field input:focus,
    .field textarea:focus  { border-color: rgba(187,134,252,0.6); }
    .field textarea        { min-height: 66px; line-height: 1.55; }
    .field input.warn,
    .field textarea.warn   { border-color: var(--amber); }
    .field input.over,
    .field textarea.over   { border-color: var(--red); }

    /* ── Progress bar ── */
    .progress-bar {
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 1px;
      margin-top: 5px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.1s, background-color 0.15s;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--purple);
      color: #181818;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

        {
          id: 'prod-wastage-tracking', label: 'Wastage Tracking',
          file: 'content/products/en/wastage-tracking.md',

          description: 'Log spoilage, kitchen mistakes, and over-production against actual consumption. Stockifi puts a real cost on every loss so waste stops hiding in your variance.'

        {
          id: 'prod-supplier-price-tracking', label: 'Supplier Price Tracking',
          file: 'content/products/en/supplier-price-tracking.md',

        },
        {
          id: 'prod-sales-and-usage', label: 'Sales and Usage',

        },
        {

          file: 'content/products/en/inventory-transfers.md',

  };

  // ── State (live edits) ──────────────────────────────────────────────────────
  const state = {};
  Object.values(DATA).forEach(section =>
    section.pages.forEach(p => {
      state[p.id] = { title: p.title, description: p.description };
    })
  );

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function status(len, max, warn) {
    return len > max ? 'over' : len >= warn ? 'warn' : 'ok';
  }

  function barColor(s) {
    return s === 'ok' ? 'var(--green)' : s === 'warn' ? 'var(--amber)' : 'var(--red)';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Render ──────────────────────────────────────────────────────────────────
  function renderSection(key, section) {
    return `
      <section class="section" id="${key}">
        <div class="section-header">
          <h2>${section.label}</h2>
          <span class="count">${section.pages.length} pages</span>
        </div>
        ${section.pages.map(renderCard).join('')}
      </section>`;
  }

  function renderCard(p) {
    const ts = status(p.title.length, TITLE_MAX, TITLE_WARN);
    const ds = status(p.description.length, DESC_MAX, DESC_WARN);
    const tp = Math.min((p.title.length / TITLE_MAX) * 100, 100).toFixed(1);
    const dp = Math.min((p.description.length / DESC_MAX) * 100, 100).toFixed(1);

    return `
      <div class="page-card">
        <div class="page-card-header">
          <span class="page-name">${esc(p.label)}</span>
          <div class="page-meta">
            <span class="badge ${p.source === 'live' ? 'badge-live' : 'badge-new'}">${p.source === 'live' ? 'live site' : 'new page'}</span>
            <span class="page-file">${esc(p.file)}</span>
          </div>
        </div>

        <div class="field">
          <div class="field-header">
            <span class="field-label">Title</span>
            <span class="char-count ${ts}" id="tc-${p.id}">${p.title.length} / ${TITLE_MAX}</span>
          </div>
          <input
            type="text"
            id="title-${p.id}"
            class="${ts !== 'ok' ? ts : ''}"
            value="${esc(p.title)}"
            data-id="${p.id}"
            data-field="title"
            data-max="${TITLE_MAX}"
            data-warn="${TITLE_WARN}"
          >
          <div class="progress-bar">
            <div class="progress-bar-fill" id="tp-${p.id}"
              style="width:${tp}%;background:${barColor(ts)}"></div>
          </div>
        </div>

        <div class="field">
          <div class="field-header">
            <span class="field-label">Description</span>
            <span class="char-count ${ds}" id="dc-${p.id}">${p.description.length} / ${DESC_MAX}</span>
          </div>
          <textarea
            id="desc-${p.id}"
            class="${ds !== 'ok' ? ds : ''}"
            data-id="${p.id}"
            data-field="description"
            data-max="${DESC_MAX}"
            data-warn="${DESC_WARN}"
            rows="3"
          >${esc(p.description)}</textarea>
          <div class="progress-bar">
            <div class="progress-bar-fill" id="dp-${p.id}"
              style="width:${dp}%;background:${barColor(ds)}"></div>
          </div>
        </div>
      </div>`;
  }

  document.getElementById('main').innerHTML =
    Object.entries(DATA).map(([k, s]) => renderSection(k, s)).join('');

  // ── Live counters ────────────────────────────────────────────────────────────
  document.getElementById('main').addEventListener('input', e => {
    const el = e.target;
    if (!el.dataset.id) return;

    const { id, field } = el.dataset;
    const max  = +el.dataset.max;
    const warn = +el.dataset.warn;
    const val  = el.value;
    const len  = val.length;
    const s    = status(len, max, warn);

    state[id][field] = val;

    const isTitle = field === 'title';
    const countEl = document.getElementById(`${isTitle ? 'tc' : 'dc'}-${id}`);
    const barEl   = document.getElementById(`${isTitle ? 'tp' : 'dp'}-${id}`);

    countEl.textContent = `${len} / ${max}`;
    countEl.className   = `char-count ${s}`;
    el.className        = s !== 'ok' ? s : '';

    barEl.style.width           = `${Math.min((len / max) * 100, 100).toFixed(1)}%`;
    barEl.style.backgroundColor = barColor(s);
  });

  // ── Export ───────────────────────────────────────────────────────────────────
  function buildMarkdown() {
    let md = '# Stockifi EN Metadata — Reviewed\n\n';
    Object.entries(DATA).forEach(([, section]) => {
      md += `## ${section.label}\n\n`;
      section.pages.forEach(p => {
        md += `### ${p.label}\n`;
        md += `FILE: ${p.file}\n`;
        md += `TITLE: ${state[p.id].title}\n`;
        md += `DESCRIPTION: ${state[p.id].description}\n\n`;
      });
    });
    return md;
  }

  function buildJSON() {
    const out = [];
    Object.entries(DATA).forEach(([sectionKey, section]) => {
      section.pages.forEach(p => {
        out.push({
          id: p.id,
          label: p.label,
          section: sectionKey,
          file: p.file,
          title: state[p.id].title,
          description: state[p.id].description
        });
      });
    });
    return JSON.stringify(out, null, 2);
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2400);
  }

  document.getElementById('copy-md').addEventListener('click', () => {
    navigator.clipboard.writeText(buildMarkdown())
      .then(() => toast('Markdown copied — paste it in the chat'))
      .catch(() => toast('Copy failed — try the JSON download instead'));
  });

  document.getElementById('download-json').addEventListener('click', () => {
    const blob = new Blob([buildJSON()], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'stockifi-meta-review.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('JSON downloaded');
  });
</script>

</body>
</html>
