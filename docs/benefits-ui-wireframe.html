<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Benefits UI — Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #212121;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    -webkit-font-smoothing: antialiased;
  }

  /* Photo scene */
  .scene {
    position: relative;
    width: 100%;
    max-width: 560px;
    aspect-ratio: 16 / 10;
    border-radius: 16px;
    overflow: hidden;
    background: #2a2a2a;
  }
  .scene-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 50%);
    mask-image: linear-gradient(to right, transparent 0%, black 50%);
  }
  .scene-photo-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #2a2520 0%, #1a1814 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.15);
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Light mode card — bottom-left */
  .card {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 240px;
    background: #ffffff;
    border: 1px solid rgba(0, 0, 0, 0.06);
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18), 0 1px 4px rgba(0, 0, 0, 0.08);
  }

  .card-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(0, 0, 0, 0.38);
    margin-bottom: 6px;
  }
  .card-total {
    font-size: 20px;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    color: #111111;
    line-height: 1;
    margin-bottom: 14px;
  }

  .card-rows {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid rgba(0, 0, 0, 0.07);
  }
  .card-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-row-check {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    display: grid;
    place-items: center;
  }
  .card-row-check svg { width: 12px; height: 12px; }
  .card-row-name {
    flex: 1;
    font-size: 11.5px;
    font-weight: 400;
    color: rgba(0, 0, 0, 0.48);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-row-value {
    font-size: 11.5px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: rgba(0, 0, 0, 0.72);
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="scene">
  <img class="scene-photo" src="/media/photos/benefits-manager-chef.png"
    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="" />
  <div class="scene-photo-placeholder" style="display:none">Photo placeholder</div>
  <div class="card">
    <p class="card-label">Total savings this month</p>
    <p class="card-total">€3,650</p>
    <div class="card-rows">
      <div class="card-row">
        <span class="card-row-check"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6.2 4.8 9 10 3.2" stroke="#34d399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="card-row-name">Invoice anomalies</span>
        <span class="card-row-value">€1,280</span>
      </div>
      <div class="card-row">
        <span class="card-row-check"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6.2 4.8 9 10 3.2" stroke="#34d399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="card-row-name">Recipe deviation</span>
        <span class="card-row-value">€1,490</span>
      </div>
      <div class="card-row">
        <span class="card-row-check"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6.2 4.8 9 10 3.2" stroke="#34d399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span class="card-row-name">Stock variance</span>
        <span class="card-row-value">€880</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
