<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stockifi · FAQ Library Reviewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#15151d; --panel:#1a1a24; --card:#1f1f2b; --fg:#f8f8fc; --muted:#a1a1b5;
    --primary:#9565db; --primary-light:#c39df9; --secondary:#29223f; --secondary-fg:#d4ccff;
    --border:#2a2a35; --warning:#fed052; --success:#6ef8a1;
    --fh:'Montserrat',system-ui,sans-serif; --fb:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#0f0f15;color:var(--fg);font-family:var(--fb);line-height:1.6;}
  .bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:14px 24px;background:#121218;border-bottom:1px solid var(--border);}
  .bar h1{font-family:var(--fh);font-size:15px;margin:0;font-weight:700;}
  .seg{display:flex;gap:6px;margin-left:8px;}
  .seg button{font:inherit;font-size:13px;padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;}
  .seg button.on{background:var(--primary);border-color:var(--primary);color:#fff;}
  select{font:inherit;font-size:13px;padding:7px 12px;border-radius:8px;background:var(--card);color:var(--fg);border:1px solid var(--border);}
  .pagesel{margin-left:auto;display:none;align-items:center;gap:8px;}
  .pagesel.show{display:flex;}
  .pagesel .count{font-size:12px;color:var(--muted);}
  .note{padding:9px 24px;background:var(--panel);border-bottom:1px solid var(--border);font-size:12.5px;color:var(--muted);}
  .note b{color:var(--primary-light);}
  .wrap{max-width:920px;margin:0 auto;padding:24px;}
  .cat-h{font-family:var(--fh);font-weight:700;font-size:18px;margin:26px 0 4px;display:flex;align-items:baseline;gap:10px;}
  .cat-h .n{font-size:12px;color:var(--muted);font-weight:500;}
  .divider{font-family:var(--fh);font-weight:600;font-size:13px;color:var(--primary-light);text-transform:uppercase;letter-spacing:.5px;margin:26px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .q{border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:10px 0;background:var(--panel);}
  .q .ques{font-family:var(--fh);font-weight:600;font-size:15px;}
  .q .ans{margin:7px 0 0;font-size:14px;color:#d7d7e0;}
  .q .ans.empty{color:var(--warning);font-style:italic;}
  .meta{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px;}
  .tag{font-size:10.5px;padding:2px 8px;border-radius:999px;border:1px solid var(--border);color:var(--muted);}
  .tag.ev{background:var(--secondary);color:var(--secondary-fg);border-color:var(--primary);}
  .tag.warn{color:var(--warning);border-color:rgba(254,208,82,.4);}
  .empty-page{color:var(--muted);font-size:13px;font-style:italic;margin:12px 0;}
</style>
</head>
<body>
  <div class="bar">
    <h1>Stockifi · FAQ Library Reviewer</h1>
    <div class="seg">
      <button id="btn-cat" class="on" onclick="setView('cat')">By category</button>
      <button id="btn-page" onclick="setView('page')">By page</button>
    </div>
    <div class="pagesel" id="pagesel">
      <label for="page">Page:</label>
      <select id="page" onchange="render()"></select>
      <span class="count" id="pgcount"></span>
    </div>
  </div>
  <div class="note">
    <b>By category</b> = the <b>/faq</b> page (master list). <b>By page</b> = what actually renders on that page (its own items first, then the shared <b>general</b> set). Draft for review, not deployed.
  </div>
  <div class="wrap" id="app"></div>

<script>
const FAQS = [
  { id:"improve-margins", q:"Does Stockifi help improve my profit margins?", a:"Yes. Stockifi gives you clear visibility into food and drink costs, over-portioning, wastage, and supplier price changes. You improve margins by seeing exactly where money is leaking.", cat:"How it works", groups:[], general:true, order:1 },
  { id:"connect-systems", q:"Does Stockifi connect to my accounting and POS?", a:"Yes. Stockifi connects with 70+ accounting and POS systems and syncs your invoices, sales, and recipes automatically. You get a single source of truth without manual work.", cat:"Integrations", groups:[], general:true, order:1 },
  { id:"guarantee", q:"Will Stockifi find hidden losses in my first 30 days?", a:"Yes. Stockifi guarantees to uncover at least €3,000 in hidden losses within your first 30 days, or you pay nothing. In most cases the amount is significantly higher.", cat:"Pricing & guarantee", groups:[], general:true, order:1 },
  { id:"cost", q:"How much does Stockifi cost?", a:"Pricing depends on the size and complexity of your setup, so we look at it together on a short call. That call also confirms Stockifi is the right fit for your operation.", cat:"Pricing & guarantee", groups:[], general:true, order:2 },
  { id:"good-fit", q:"Is Stockifi a good fit for my restaurant?", a:"Yes, if you have established processes. Stockifi fits independent restaurants, hotel restaurants with full food and drink service, and multi-location groups. It is less suited to very early-stage venues still building theirs.", cat:"Fit for your business", groups:[], general:true, order:1 },
  { id:"find-leaks", q:"Does Stockifi show me where my food cost is leaking?", a:"Yes. Stockifi compares what you bought, what you sold, and what your recipes expected, then shows over-portioning, waste, and price rises down to the dish.", cat:"How it works", groups:["home","profitability"], general:false, order:2 },
  { id:"count-schedule", q:"Can I count stock on my own schedule?", a:"Yes. Stockifi uses periodic stock counts with variance analysis in the app. You count when it suits you, then see actual usage against what your recipes predicted.", cat:"How it works", groups:["home","stock-counting","inventory-transfers"], general:false, order:3 },
  { id:"theoretical-actual", q:"Does Stockifi show the gap between theoretical and actual food cost?", a:"Yes. Theoretical is what your recipes and sales say you should have used. Actual is what your counts and invoices show you really used. Stockifi shows the variance between them, which is where margin leaks.", cat:"How it works", groups:["home","profitability","variance-analysis"], general:false, order:4 },
  { id:"get-started-48", q:"Can I get started in 48 hours?", a:"Yes. Stockifi handles the heavy lifting. We import your item lists and recipes, set up the integrations, and prepare everything for your first stock count, within 48 hours.", cat:"Getting started", groups:["home","pricing"], general:false, order:1 },
  { id:"recipes-setup", q:"Do you set up our recipes for us?", a:"Yes. You share your recipes and we build them in, with ingredient costs tracked from the start. The manual setup is handled for you.", cat:"Getting started", groups:["home","recipe-building"], general:false, order:2 },
  { id:"phone-only", q:"Is my phone all I need to get started?", a:"Yes. Download the app and you are ready to go. No extra hardware is required.", cat:"Getting started", groups:["home","stock-counting"], general:false, order:3 },
  { id:"what-i-need", q:"What do I need to get started?", a:"An accounting system, ideally a POS Stockifi can connect to, and your menu recipes. We handle the setup with you, so there is no manual data entry on your side.", cat:"Getting started", groups:["home","pricing"], general:false, order:4 },
  { id:"recipe-costs", q:"Does Stockifi calculate recipe and dish costs automatically?", a:"Yes. Stockifi keeps the cost of every recipe and dish current as supplier prices change, so you always know your real margin.", cat:"Features & reports", groups:["recipe-building","profitability"], general:false, order:1 },
  { id:"dish-profit", q:"Can I see which dishes make or lose money?", a:"Yes. Stockifi shows profit and margin by dish, location, and period, so you can see what earns and what quietly loses margin.", cat:"Features & reports", groups:["profitability","performance-dashboards"], general:false, order:2 },
  { id:"wastage", q:"Does Stockifi track wastage?", a:"Yes. You log wastage in the app and Stockifi factors it into your variance and food cost, so spoilage stops hiding in the numbers.", cat:"Features & reports", groups:["wastage-tracking"], general:false, order:3 },
  { id:"anomalies", q:"Does Stockifi flag unusual supplier price changes?", a:"Yes. Stockifi watches every invoice and flags anomalies like overcharging or sudden price jumps, so you catch them before they reach your margin.", cat:"Features & reports", groups:["anomaly-detection","supplier-price-tracking"], general:false, order:4 },
  { id:"multi-location", q:"Can I manage stock across multiple locations?", a:"Yes. Multi-location groups get consolidated visibility, and you record inventory transfers between sites within each count.", cat:"Features & reports", groups:["inventory-transfers","restaurant-groups"], general:false, order:5 },
  { id:"reports", q:"What reports does Stockifi give me?", a:"Stockifi gives you variance and wastage reports, COGS development, over-portioning, supplier price deviations, and profit reports, with full visibility over actual against theoretical consumption.", cat:"Features & reports", groups:["performance-dashboards","variance-analysis"], general:false, order:6 },
  { id:"work-alongside", q:"Does Stockifi work with the systems I already have?", a:"Yes. It connects to your POS and accounting software to read the data and leaves your existing setup in place. It does not replace them.", cat:"Integrations", groups:["home"], general:false, order:2 },
  { id:"accounting-integration", q:"How does the accounting integration work?", a:"Stockifi reads your supplier invoices line by line, so ingredient prices and quantities update automatically and recipe costs stay current as prices move.", cat:"Integrations", groups:["invoice-automation","supplier-price-tracking"], general:false, order:3 },
  { id:"not-on-list", q:"What if my system is not on the list?", a:"Tell us what you run and we will confirm it on a quick call. Custom integrations are available on the Custom plan.", cat:"Integrations", groups:["home"], general:false, order:4 },
  { id:"fixed-price", q:"Is my price fixed?", a:"Yes. Your monthly price is fixed. The 30-day guarantee removes the risk of trying Stockifi.", cat:"Pricing & guarantee", groups:["pricing"], general:false, order:3 },
  { id:"no-cc", q:"Can I start without a credit card or a long-term contract?", a:"Yes. You can start without a credit card and without a long-term contract. Stockifi earns its place by delivering value, not by locking you in.", cat:"Pricing & guarantee", groups:["pricing","home"], general:false, order:4 },
  { id:"plans", q:"What plans does Stockifi offer?", a:"Stockifi has three plans: Automated, Full Control, and Custom. Higher tiers add recipe cost calculations, variance and wastage reports, POS integrations, and multi-location setup.", cat:"Pricing & guarantee", groups:["pricing"], general:false, order:5 },
  { id:"groups-fit", q:"Does Stockifi work for restaurant groups?", a:"Yes. Groups use Stockifi to keep recipe costs aligned across sites and to see consolidated variance and margin in one place.", cat:"Fit for your business", groups:["restaurant-groups"], general:false, order:2 },
  { id:"hotels-fit", q:"Does Stockifi work for hotels?", a:"Yes, for hotels with full food and drink operations. Breakfast-only F&B usually does not have the volume to benefit.", cat:"Fit for your business", groups:["hotels"], general:false, order:3 },
  { id:"bars-fit", q:"Does Stockifi work for bars?", a:"Yes. Bars use Stockifi to track pour cost and spot variance behind the bar.", cat:"Fit for your business", groups:["bars"], general:false, order:4 },
  { id:"language", q:"Can my team use Stockifi in our language?", a:"Yes. Your data stays in your language and the app is in English. We run a short training so your team is comfortable from the start.", cat:"Data, security & support", groups:["home"], general:false, order:1 },
  { id:"support", q:"What support do I get?", a:"Advanced support on every plan, dedicated customer care on Full Control, and a quarterly business review on Custom.", cat:"Data, security & support", groups:["pricing","home"], general:false, order:2 },
  { id:"export", q:"Can I export my data from Stockifi?", a:"Yes. Your data is yours and you can export it.", cat:"Data, security & support", groups:[], general:false, order:3, verify:true },
  { id:"sec-secure", q:"Is my data secure?", a:"", cat:"Data, security & support", groups:[], general:false, order:4, todo:true },
  { id:"sec-gdpr", q:"Is Stockifi GDPR compliant?", a:"", cat:"Data, security & support", groups:[], general:false, order:5, todo:true },
  { id:"sec-hosting", q:"Where is my data hosted?", a:"", cat:"Data, security & support", groups:[], general:false, order:6, todo:true },
  { id:"sec-cancel", q:"What happens to my data if I cancel?", a:"", cat:"Data, security & support", groups:[], general:false, order:7, todo:true }
];

const CATEGORIES = ["Getting started","How it works","Features & reports","Integrations","Pricing & guarantee","Fit for your business","Data, security & support"];
const PAGES = [
  {slug:"home", label:"Home"},
  {slug:"pricing", label:"Pricing"},
  {slug:"invoice-automation", label:"Product · Invoice automation"},
  {slug:"supplier-price-tracking", label:"Product · Supplier price tracking"},
  {slug:"central-kitchen", label:"Product · Central kitchen"},
  {slug:"anomaly-detection", label:"Product · Anomaly detection"},
  {slug:"recipe-building", label:"Product · Recipe building"},
  {slug:"stock-counting", label:"Product · Stock counting"},
  {slug:"inventory-transfers", label:"Product · Inventory transfers"},
  {slug:"wastage-tracking", label:"Product · Wastage tracking"},
  {slug:"performance-dashboards", label:"Product · Performance dashboards"},
  {slug:"variance-analysis", label:"Product · Variance analysis"},
  {slug:"profitability", label:"Product · Profitability"},
  {slug:"api", label:"Product · API"},
  {slug:"independent-restaurants", label:"Solution · Independent restaurants"},
  {slug:"restaurant-groups", label:"Solution · Restaurant groups"},
  {slug:"hotels", label:"Solution · Hotels"},
  {slug:"bars", label:"Solution · Bars"},
  {slug:"management", label:"Solution · Management"},
  {slug:"operations", label:"Solution · Operations"},
  {slug:"kitchen", label:"Solution · Kitchen"},
  {slug:"finance", label:"Solution · Finance"}
];

let view = "cat";
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function metaTags(f, inPageView){
  const t = [];
  if (f.general) t.push('<span class="tag ev">Everywhere</span>');
  if (!inPageView && f.groups && f.groups.length) t.push('<span class="tag">Pages: ' + esc(f.groups.join(", ")) + '</span>');
  if (!f.general && (!f.groups || !f.groups.length) && !f.todo && !f.verify) t.push('<span class="tag">/faq only</span>');
  if (f.verify) t.push('<span class="tag warn">Verify with team</span>');
  if (f.todo) t.push('<span class="tag warn">Needs Ivan / Sime</span>');
  return '<div class="meta">' + t.join("") + '</div>';
}
function card(f, inPageView){
  const ans = f.a ? '<p class="ans">' + esc(f.a) + '</p>' : '<p class="ans empty">(answer pending)</p>';
  return '<div class="q"><div class="ques">' + esc(f.q) + '</div>' + ans + metaTags(f, inPageView) + '</div>';
}
function byOrder(a,b){ return (a.order||99) - (b.order||99); }

function renderCat(){
  let h = "";
  CATEGORIES.forEach(cat => {
    const items = FAQS.filter(f => f.cat === cat).sort(byOrder);
    h += '<div class="cat-h">' + esc(cat) + ' <span class="n">' + items.length + ' items</span></div>';
    items.forEach(f => h += card(f, false));
  });
  return h;
}
function renderPage(){
  const slug = document.getElementById("page").value;
  const specific = FAQS.filter(f => !f.general && f.groups && f.groups.includes(slug)).sort(byOrder);
  const general = FAQS.filter(f => f.general).sort(byOrder);
  document.getElementById("pgcount").textContent = (specific.length + general.length) + " total";
  let h = '<div class="divider">On this page (' + specific.length + ')</div>';
  if (specific.length === 0) h += '<p class="empty-page">No page-specific FAQs yet — only the general set shows here. Worth adding a few for this page.</p>';
  specific.forEach(f => h += card(f, true));
  h += '<div class="divider">General — shown on every page (' + general.length + ')</div>';
  general.forEach(f => h += card(f, true));
  return h;
}
function render(){
  document.getElementById("app").innerHTML = view === "cat" ? renderCat() : renderPage();
}
function setView(v){
  view = v;
  document.getElementById("btn-cat").classList.toggle("on", v === "cat");
  document.getElementById("btn-page").classList.toggle("on", v === "page");
  document.getElementById("pagesel").classList.toggle("show", v === "page");
  render();
}
// init
const sel = document.getElementById("page");
PAGES.forEach(p => { const o = document.createElement("option"); o.value = p.slug; o.textContent = p.label; sel.appendChild(o); });
render();
</script>
</body>
</html>
